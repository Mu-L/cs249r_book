schema_version: 1
report_kind: flow_polish_worker_report
required_top_level_fields:
  - schema_version
  - report_kind
  - qmd_path
  - worker_id
  - worker_status
  - audit_scope
  - checks
  - edits
  - residual_issues
  - notes
field_contract:
  schema_version:
    type: integer
    required_value: 1
  report_kind:
    type: string
    required_value: flow_polish_worker_report
  qmd_path:
    type: string
    rule: "Repo-relative path to the assigned QMD file."
  worker_id:
    type: string
    rule: "Agent id or manual-backfill id."
  worker_status:
    type: string
    allowed_values:
      - edited
      - reviewed_no_change
      - blocked
  audit_scope:
    type: mapping
    required_fields:
      - assigned_file_only
      - full_file_read
      - allowed_edit_scope
    fields:
      assigned_file_only:
        type: boolean
      full_file_read:
        type: boolean
      allowed_edit_scope:
        type: string
  checks:
    type: mapping
    required_fields:
      - paragraph_flow
      - section_transitions
      - callout_leadins
      - adjacent_callouts
      - repeated_callout_titles
      - italicized_transitions
      - technical_meaning_preserved
    status_values:
      - pass
      - fixed
      - not_applicable
      - needs_review
    item_shape:
      status: string
      notes: string
  edits:
    type: sequence
    item_shape:
      location: string
      type: string
      summary: string
    empty_value: []
  residual_issues:
    type: sequence
    item_shape:
      location: string
      severity: string
      issue: string
      recommendation: string
    empty_value: []
  notes:
    type: string
worker_instructions:
  - "Edit only qmd_path and this file's unique report YAML."
  - "Use small prose edits only; preserve labels, crossrefs, citations, equations, code, YAML metadata, and technical meaning."
  - "A callout may directly follow prose only when the preceding paragraph naturally leads into it."
  - "Do not leave an italicized dangling signpost immediately before a callout."
  - "Do not make the scaffolding visible with phrases such as 'the following callout' or 'in the callout below' unless the reading path genuinely requires it."
  - "Do not repeat a callout title in nearby lead-in prose unless the prose needs the term independently; prefer narrative setup such as 'A quick estimate makes the bottleneck concrete.'"
  - "If two substantive callouts are back-to-back, add a short bridge or record why the adjacency is structural."
