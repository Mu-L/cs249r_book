# Project citation style shared by PDF, HTML, and EPUB builds.
# Based on Chicago author-date, with MLSysBook/MIT Press bibliography conventions.
# The CSL title-cases rendered titles. Keep .bib titles sentence case and brace
# acronyms/proper nouns, e.g. {BERT}, {TinyML}, {TensorFlow}, so citeproc
# preserves semantic capitalization.
csl: assets/csl/mlsysbook-mit-press.csl
link-bibliography: false
