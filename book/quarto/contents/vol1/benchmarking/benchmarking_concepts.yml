  formulas:
    - 'Hardware efficiency: $\eta_{\text{hw}} = R_{\text{sustained}} / R_{\text{peak}}$'
    - 'Time-to-accuracy: $T_{\text{train}} = \arg\min_t \{\text{Accuracy}(t) \geq \text{target accuracy}\}$'
    - 'Training throughput: $\text{Throughput} = N_{\text{samples}} / T_{\text{train}}$'
    - 'Scaling efficiency: $\eta_{\text{scaling}} = T(1) / (N \cdot T(N)) \cdot 100\%$'
    - 'Per-query energy: $E_{\text{total}} = \text{Power} \cdot T$'
    - 'Amdahl optimization ceiling: $\text{maximum speedup} = 1 / \text{nonoptimized fraction}$'
    - 'Coefficient of variation: $\text{CV} = \sigma_{\text{run}} / \mu_{\text{run}}$'
    - 'Effective bandwidth: $\text{BW}_{\text{effective}} = D_{\text{vol}} / T_{\text{kernel}}$'
    - 'Binomial uncertainty: $\sigma_{\text{err}} = \sqrt{N_{\text{test}} p_{\text{err}} (1 - p_{\text{err}})}$'
    - 'GPU utilization: achieved FLOP/s / peak FLOP/s'
