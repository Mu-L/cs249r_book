  formulas:
    - 'Data as code: System Behavior ~= f(Data)'
    - 'Data gravity: $C_{\text{move}}(D_{\text{vol}}) \gg C_{\text{move}}(\text{Compute})$'
    - 'Iron Law: $T = D_{\text{vol}} / \text{BW} + O / (R_{\text{peak}} \cdot \eta_{\text{hw}}) + L_{\text{lat}}$'
    - 'Arithmetic intensity law: $R_{\text{attainable}} = \min(R_{\text{peak}}, I \cdot \text{BW})$'
    - 'Energy-movement invariant: $E_{\text{move}} \gg E_{\text{compute}}$'
    - 'Amdahl''s Law: $\text{Speedup} = 1 / ((1 - p) + p / G_{\text{parallel}})$'
    - 'Verification gap: $\Pr(f(x) \approx y) > 1 - \epsilon_{\text{test}}$'
    - 'Statistical drift: $\text{Accuracy}(t) \approx \text{Accuracy}_0 - \lambda \cdot \mathcal{D}(P_t \lVert P_0)$'
    - 'Training-serving skew: \Delta \text{Accuracy} \approx \mathbb{E}[|f_{\text{serve}}(x) - f_{\text{train}}(x)|]'
    - 'Bias feedback: \Delta_{\text{err},g}(n) \approx \Delta_{\text{err},g}(0) \cdot \alpha_{\text{fb}}^n, \alpha_{\text{fb}} > 1'
    - 'Tail latency ratio: P99 latency / mean latency'
    - 'Cluster MTBF: component MTTF / number of independent components'
