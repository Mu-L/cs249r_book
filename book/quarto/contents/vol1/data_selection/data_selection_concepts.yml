  formulas:
  - 'ICR: ICR = Delta I / Delta FLOPs'
  - 'ICR decay: ICR(D) approx 1 / (O * D)'
  - 'Data Quality Multiplier: N_clean proportional to 1/epsilon; N_noisy proportional to 1/epsilon^2'
  - 'Selection Inequality: T_selection + T_train(N_subset) < T_train(N_total)'
  - 'Total Data Cost: C_total = C_acquire + C_label + C_store + C_process'
  - 'ROI: (Savings - Investment) / Investment * 100%'
  - 'Amortized ROI: (N_runs * Per-Run Savings - One-Time Investment) / One-Time Investment * 100%'
  - 'PPD: (Accuracy(n) - Accuracy(0)) / n'
  - 'AULC: integral_0^N Accuracy(n) dn'
  - 'DCR: N_full / N_coreset at target accuracy'
  - 'Data Echoing Ratio: R = T_data_pipeline / T_GPU_training'
  - 'Chinchilla D/N Diagnostic: training tokens per model parameter'
  - \text{ICR} = \frac{\Delta I}{\Delta \text{FLOPs}}
  - \text{ICR}(D) = \frac{\frac{d}{dD} I(D)}{\frac{d}{dD} C(D)} \approx \frac{1/D}{O} = \frac{1}{O \cdot D}
  applications:
  - Coreset selection for smaller training sets
  - Deduplication for web-scale data pipelines
  - Active learning label acquisition loops
  - Synthetic data augmentation and filtering
  - Dynamic curriculum and hard-example selection
  - 'Scenario: Training ResNet-50 on ImageNet with heavy augmentation (RandAugment + MixUp).'
