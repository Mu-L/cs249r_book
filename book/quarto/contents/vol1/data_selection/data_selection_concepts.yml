  formulas:
    - 'ICR: $\text{ICR} = \Delta \mathcal{I} / \Delta O$'
    - 'ICR decay: $\text{ICR}(D) \approx 1 / (O_{\text{sample}} \cdot D)$'
    - 'Data Quality Multiplier: $N_{\text{clean}} \propto 1/\epsilon;\ N_{\text{noisy}} \propto 1/\epsilon^2$'
    - 'Selection Inequality: $T_{\text{selection}} + T_{\text{train}}(N_{\text{subset}}) < T_{\text{train}}(N_{\text{total}})$'
    - 'Total Data Cost: $C_{\text{total}} = C_{\text{acquire}} + C_{\text{label}} + C_{\text{store}} + C_{\text{process}}$'
    - 'ROI: $(\text{Savings} - \text{Investment}) / \text{Investment} \cdot 100\%$'
    - 'Amortized ROI: $(N_{\text{runs}} \cdot \text{Per-Run Savings} - \text{One-Time Investment}) / \text{One-Time Investment} \cdot 100\%$'
    - 'PPD: $(\text{Accuracy}(n) - \text{Accuracy}(0)) / n$'
    - 'AULC: $\int_0^D \text{Accuracy}(n)\,dn$'
    - 'DCR: $N_{\text{full}} / N_{\text{coreset}}$ at target accuracy'
    - 'Data Echoing Ratio: $\rho_{\text{echo}} = T_{\text{data pipeline}} / T_{\text{GPU training}}$'
    - 'Chinchilla D/P Diagnostic: training tokens per model parameter'
    - '$\text{ICR} = \frac{\Delta \mathcal{I}}{\Delta O}$'
    - '$\text{ICR}(D) = \frac{\frac{d}{dD}\mathcal{I}(D)}{\frac{d}{dD}C(D)} \approx \frac{1/D}{O_{\text{sample}}} = \frac{1}{O_{\text{sample}} \cdot D}$'
