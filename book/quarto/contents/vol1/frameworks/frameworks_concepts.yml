    - "N_{\\text{breakeven}} = \\frac{T_{\\text{compile}}}{T_{\\text{eager}} - T_{\\text{compiled}}}"
    - "\\text{Overhead Ratio} = \\frac{N_{\\text{ops}} \\cdot t_{\\text{dispatch}}}{T_{\\text{compute}} + T_{\\text{memory}}}"
