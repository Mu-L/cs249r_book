  formulas:
    - "Model output reproducibility: f(Code_v, Data_v, Config_v, Environment_v)"
    - "Skew cost: Base Error Rate * Query Volume * Error Impact"
    - "Retrain decision: Delta Accuracy * Value per Point > Training Cost + Deployment Risk"
    - "Accuracy decay: A(t) = A_0 * e^(-gamma t)"
    - "Staleness cost: integral of Q * V * (A_0 - A(t)) over retraining interval"
    - "Optimal retraining interval: T* ~= sqrt(2C / (Q * V * A_0 * gamma))"
    - "A/B sample size: 2(z_alpha/2 + z_beta)^2 sigma^2 / delta^2"
    - "Cost per 1K inferences: Hourly GPU cost * 1000 / Inferences per hour"
    - "Observability cost: Frequency * Metrics * (Ingest Cost + Storage Cost)"
    - "PSI: sum((actual_i - expected_i) * ln(actual_i / expected_i))"
    - "KL divergence: sum(P(x) * log(P(x) / Q(x)))"
    - "Monitoring ROI: Incidents Prevented * Avg Incident Cost / Annual Monitoring Cost"
    - "Annual MLOps ROI: incident savings plus time savings over annual investment"
