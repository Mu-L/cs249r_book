  methodologies:
    - Bottleneck diagnosis with iron-law terms
    - Workload archetype mapping
    - Deployment decision framework (privacy, latency, compute, cost)
    - Total cost of ownership and break-even analysis
    - Hybrid pattern selection (Train-Serve Split, Hierarchical Processing, Progressive Deployment)
    - Full-pipeline profiling before model optimization
  formulas:
    - "Light Barrier Latency: Latency_min = 2 * Distance / c_fiber"
    - "Power Scaling: Power proportional to C * V^2 * f, with V proportional to f, so Power proportional to f^3"
    - "Memory Wall Ratio: Compute Growth Rate / Memory Bandwidth Growth Rate approx 1.33"
    - "Iron Law: T = D_vol / BW + O / (R_peak * eta_hw) + L_lat"
    - "Bottleneck Principle: T_bottleneck = max(D_vol / BW, O / (R_peak * eta_hw), T_network) + L_lat"
    - "Data Locality Invariant: D_vol / BW_net > L_net + O / R_peak_remote"
    - "Energy Budget: Energy = Power * T"
    - "Amdahl Speedup: 1 / ((1 - p) + p / s)"
