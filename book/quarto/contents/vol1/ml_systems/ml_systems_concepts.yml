  formulas:
    - 'Light Barrier Latency: $L_{\text{lat,min}} = 2 \cdot \text{Distance} / c_{\text{fiber}}$'
    - 'Power Scaling: $\text{Power} \propto C \cdot V^2 \cdot f$, with $V \propto f$, so $\text{Power} \propto f^3$'
    - 'Memory Wall Ratio: $\text{Compute Growth Rate} / \text{Memory Bandwidth Growth Rate} \approx 1.33$'
    - 'Iron Law: $T = D_{\text{vol}}/\text{BW} + O/(R_{\text{peak}} \cdot \eta_{\text{hw}}) + L_{\text{lat}}$'
    - 'Bottleneck Principle: $T_{\text{bottleneck}} = \max(D_{\text{vol}}/\text{BW}, O/(R_{\text{peak}} \cdot \eta_{\text{hw}}), T_{\text{network}}) + L_{\text{lat}}$'
    - 'Data Locality Invariant: $D_{\text{vol}}/\text{BW}_{\text{network}} > L_{\text{lat,network}} + O/(R_{\text{peak,remote}} \cdot \eta_{\text{hw,remote}})$'
    - 'Energy Budget: $E_{\text{total}} = \text{Power} \cdot T$'
    - 'Amdahl Speedup: $1 / ((1 - p) + p / s)$'
    - 'Break-even utilization: $\text{Edge Fixed Costs} / (\text{Cloud Variable Cost per Unit} \cdot \text{Capacity})$'
    - '$L_{\text{lat,min}} = \frac{2 \times \text{Distance}}{c_{\text{fiber}}} \approx \frac{2 \times \text{Distance}}{200{,}000 \text{ km/s}}$'
    - '$\text{Power} \propto C \times V^2 \times f \quad \text{where } V \propto f \implies \text{Power} \propto f^3$'
    - '$\frac{\text{Compute Growth Rate}}{\text{Memory Bandwidth Growth Rate}} \approx \frac{1.6}{1.2} \approx 1.33$'
    - '$T = \frac{D_{\text{vol}}}{\text{BW}} + \frac{O}{R_{\text{peak}} \cdot \eta_{\text{hw}}} + L_{\text{lat}}$'
    - '$T_{\text{bottleneck}} = \max\left(\frac{D_{\text{vol}}}{\text{BW}}, \frac{O}{R_{\text{peak}} \cdot \eta_{\text{hw}}}, T_{\text{network}}\right) + L_{\text{lat}}$'
    - '$T = \max\left( \frac{O}{R_{\text{peak}} \cdot \eta_{\text{hw}}}, \frac{D_{\text{vol}}}{\text{BW}}, \frac{D_{\text{vol}}}{\text{BW}_{\text{IO}}} \right) + L_{\text{lat}}$'
