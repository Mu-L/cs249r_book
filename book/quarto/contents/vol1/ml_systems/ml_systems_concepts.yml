  primary_concepts:
    - Deployment paradigms (Cloud, Edge, Mobile, TinyML)
    - Physical constraints (Light Barrier, Power Wall, Memory Wall)
    - Iron Law and Bottleneck Principle
    - Workload archetypes and Lighthouse Models
    - Paradigm selection and quantitative trade-offs
    - Hybrid ML architectures
  secondary_concepts:
    - Single-Node Stack and silicon contract
    - System balance across compute, memory, and I/O
    - Data Locality Invariant and locality crossover
    - Energy per inference and battery tax
    - Complexity tax and organizational fit
    - System entropy and distribution shift
  technical_terms:
    - Thermal Design Power (TDP)
    - Neural Processing Unit (NPU)
    - System-on-Chip (SoC)
    - High Bandwidth Memory (HBM)
    - Microcontroller (MCU)
    - Power Usage Effectiveness (PUE)
