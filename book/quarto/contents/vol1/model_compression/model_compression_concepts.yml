  formulas:
    - 'Pruning objective: $\min \mathcal{L}(\hat{W}) \text{ subject to } \|\hat{W}\|_0 \leq k$'
    - 'Mask pruning: $\hat{W} = M \odot W;\ M_{ij} = 1 \text{ if } |W_{ij}| > \tau_{\text{prune}}$'
    - 'Distillation softmax: $p_i^{(\tau_{\text{distill}})} = \exp(z_i/\tau_{\text{distill}}) / \sum_j \exp(z_j/\tau_{\text{distill}})$'
    - 'Distillation loss: $\mathcal{L}_{\text{distill}} = (1 - \gamma_{\text{KD}})\mathcal{L}_{\text{CE}}(p_{\text{student}}, y) + \gamma_{\text{KD}}\tau_{\text{distill}}^2 \operatorname{KL}(p_{\text{teacher}}^{(\tau_{\text{distill}})}, p_{\text{student}}^{(\tau_{\text{distill}})})$'
    - 'Low-rank factorization: $A \approx U V$; storage $\mathcal{O}(mn)$ to $\mathcal{O}(mk + kn)$'
    - 'Uniform quantization: $q = \operatorname{round}(x / s)$'
    - 'Affine quantization: $s = (\beta - \alpha)/(2^b - 1)$, $z = \operatorname{round}(-\alpha/s)$'
    - 'Quantize/dequantize: $x_q = \operatorname{clamp}(\operatorname{round}(x/s + z), 0, 2^b - 1)$, $x \approx s(x_q - z)$'
    - 'Fake quantization: $q_{\text{level}} = \operatorname{clip}(\operatorname{round}(x/s), -2^{b-1}, 2^{b-1}-1)$, $x_{\text{fake}} = q_{\text{level}} \cdot s$'
    - 'Compound scaling: $d = \alpha^\phi d_0$, $w = \beta^\phi w_0$, $r = \gamma^\phi r_0$'
    - 'NAS objective: $\alpha^* = \arg\min_{\alpha \in \mathcal{A}} \mathcal{L}_{\text{val}}(w^*(\alpha), \alpha) \text{ subject to } C(\alpha) \leq C_{\text{max}}$'
    - 'Operator fusion memory: $M_{\text{unfused}} = 2NM$, $M_{\text{fused}} = 2M$'
    - 'Sparsity ratio: $\rho_{\text{sparse}} = \|1_{(W_{\text{sparse}})_{ij} = 0}\|_0 / (mn)$'
    - 'Amdahl bound: $\text{Speedup} = 1 / ((1 - p) + p / s)$'
    - '$\min_{\hat{W}} \mathcal{L}(\hat{W}) \quad \text{subject to} \quad \|\hat{W}\|_0 \leq k$'
    - '$\hat{W} = M \odot W$'
    - '$M_{i,j} = \begin{cases} 1, & \text{if } |W_{i,j}| > \tau_{\text{prune}} \\ 0, & \text{otherwise} \end{cases}$'
    - 'Mask pruning: $\hat{W} = M \odot W;\ M_{ij} = 1 \text{ if } |W_{ij}| > \tau_{\text{prune}}$'
