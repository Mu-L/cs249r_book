  formulas:
    - 'Pruning objective: min L(W_hat) subject to ||W_hat||_0 <= k'
    - 'Mask pruning: W_hat = M \odot W; M_ij = 1 if |W_ij| > tau'
    - 'Distillation softmax: p_i(T) = exp(z_i/T) / sum_j exp(z_j/T)'
    - 'Distillation loss: L = (1 - alpha) L_CE + alpha T^2 KL(p_teacher^T, p_student^T)'
    - 'Low-rank factorization: A approx U V; storage O(mn) to O(mk + kn)'
    - 'Uniform quantization: q = round(x / s)'
    - 'Affine quantization: s = (beta - alpha)/(2^b - 1), z = round(-alpha/s)'
    - 'Quantize/dequantize: x_q = clamp(round(x/s + z), 0, 2^b - 1), x approx s(x_q - z)'
    - 'Fake quantization: q_level = clip(round(x/s), -2^(b-1), 2^(b-1)-1), x_fake = q_level * s'
    - 'Compound scaling: d = alpha^phi d0, w = beta^phi w0, r = gamma^phi r0'
    - 'NAS objective: alpha* = argmin_{alpha in A} L_val(w*(alpha), alpha) subject to C(alpha) <= C_max'
    - 'Operator fusion memory: Memory_unfused = 2 N M, Memory_fused = 2 M'
    - 'Sparsity ratio: S = ||1_{T_ij = 0}||_0 / (m n)'
    - 'Amdahl bound: Speedup = 1 / ((1 - p) + p / s)'
    - \min_{\hat{W}} \mathcal{L}(\hat{W}) \quad \text{subject to} \quad \|\hat{W}\|_0 \leq k
    - \hat{W} = M \odot W
    - M_{i,j} = \begin{cases} 1, & \text{if } |W_{i,j}| > \tau \\ 0, & \text{otherwise} \end{cases}
    - 'Mask pruning: W_hat = M odot W; M_ij = 1 if |W_ij| > tau'
