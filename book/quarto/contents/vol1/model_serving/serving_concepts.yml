  formulas:
    - "System efficiency: sum(T_compute) / (wall clock time * resource count)"
    - "Little's Law: N_req = lambda * T_lat"
    - "Batching tax: W_total ~= (B - 1) / (2 * lambda) + T_inf(B)"
    - "M/M/1 wait time: W = 1 / (mu - lambda) = service time / (1 - rho)"
    - "p99 latency: W_p99 ~= 4.6 * service time / (1 - rho)"
    - "Poisson expected batch size: E[batch size] = lambda * T"
    - "Precision-throughput ratio: Throughput_INT8 / Throughput_FP32 = 32 / 8"
    - "Quantization error: epsilon_quant proportional to alpha * ||W||_2 * 2^-b"
    - "Token generation time: T_token ~= model size bytes / memory bandwidth bytes per second"
