  formulas:
    - 'Dense layer: $h^{(l)} = f(h^{(l-1)}W^{(l)} + b^{(l)})$'
    - 'Convolution: $output[i,j,k] = \sum_c \sum_{di,dj} W[di,dj,c,k] X[i+di,j+dj,c]$'
    - 'Translation equivariance and invariance: $f(T(x)) = T(f(x))$ vs. $f(T(x)) = f(x)$'
    - 'RNN update: $h_t = f(W_{\text{hh}}h_{t-1} + W_{\text{hx}}x_t + b_h)$'
    - 'Scaled attention: $Attention(Q,K,V) = softmax(QK^T / \sqrt{d_k})V$'
    - 'Self-attention: $SelfAttention(X) = softmax(XW_Q(XW_K)^T / \sqrt{d_k})XW_V$'
    - 'Residual block: $y = F(x) + x$'
    - 'KV cache scaling: $O(B \times N_{\text{layers}} \times 2 \times N_{\text{heads}} \times S \times d_{\text{head}})$'
    - 'Dense batch-1 intensity: $\text{Intensity} \approx \frac{2 \cdot M \cdot N \text{ FLOPs}}{4 \cdot M \cdot N \text{ bytes}} = 0.5 \text{ FLOP/byte}$'
    - 'Convolution formalism: $(f * \mathbf{w})[i, j] = \sum_{m,n} \mathbf{w}[m, n] \cdot \mathbf{x}[i + m, j + n]$'
    - 'Multi-head attention: $\text{MultiHead}(\mathbf{Q}, \mathbf{K}, \mathbf{V}) = \text{Concat}(\text{head}_1, \ldots, \text{head}_h)\mathbf{W}^O$'
    - 'Batch normalization: $\hat{x}_i = \frac{x_i - \mu_{\mathcal{B}}}{\sqrt{\sigma_{\mathcal{B}}^2 + \epsilon}},\ y_i = \gamma\hat{x}_i + \beta$'
    - 'Layer normalization: $\text{LayerNorm}(\mathbf{x}) = \frac{\mathbf{x} - \mu_{\text{LN}}}{\sqrt{\sigma_{\text{LN}}^2 + \epsilon}} \odot \boldsymbol{\gamma} + \boldsymbol{\beta}$'
