  formulas:
    - 'Neuron weighted sum: z = sum_i(x_i * w_ij) + b'
    - 'Layer linear transform: Z^(l) = A^(l-1) W^(l) + b^(l)'
    - 'Layer activation: A^(l) = f(Z^(l))'
    - 'Softmax: softmax(z_i) = exp(z_i) / sum_j exp(z_j)'
    - 'Cross-entropy: $\mathcal{L}(\hat{y}, y) = -\sum_j y_j \log(\hat{y}_j)$'
    - 'Batch loss: $\mathcal{L}_{\text{batch}} = (1 / B) * \sum_i \mathcal{L}(\hat{y}_i, y_i)$'
    - 'Weight gradient: $\frac{\partial \mathcal{L}}{\partial W^{(l)}} = (A^{(l-1)})^T \frac{\partial \mathcal{L}}{\partial Z^{(l)}}$'
    - 'Chain rule gradient: $\frac{\partial \mathcal{L}}{\partial A^{(l)}} = \frac{\partial \mathcal{L}}{\partial A^{(l+1)}} \frac{\partial A^{(l+1)}}{\partial A^{(l)}}$'
    - 'Gradient descent: $\theta_{\text{new}} = \theta_{\text{old}} - \eta \nabla_\theta \mathcal{L}$'
    - 'Batch gradient: $\nabla_\theta \mathcal{L}_{\text{batch}} = (1 / B) * \sum_i \nabla_\theta \mathcal{L}_i$'
    - 'Stable softmax: softmax(z_i) = exp(z_i - max(z)) / sum_j exp(z_j - max(z))'
    - 'Training memory: weights + gradients + optimizer states + activations'
    - 'Fully connected layer FLOPs: 2 * input_dim * output_dim * batch_size'
    - z = \sum (x_i \cdot w_{ij})
    - z = \sum (x_i \cdot w_{ij}) + b
    - \sigma(x) = \frac{1}{1 + e^{-x}}
    - \tanh(x) = \frac{e^x - e^{-x}}{e^x + e^{-x}}
    - \text{ReLU}(x) = \max(0, x)
