  formulas:
    - "Neuron weighted sum: z = sum_i(x_i * w_ij) + b"
    - "Layer linear transform: Z^(l) = A^(l-1) W^(l) + b^(l)"
    - "Layer activation: A^(l) = f(Z^(l))"
    - "Softmax: softmax(z_i) = exp(z_i) / sum_j exp(z_j)"
    - "Cross-entropy: L(y_hat, y) = -sum_j y_j log(y_hat_j)"
    - "Batch loss: L_batch = (1 / B) * sum_i L(y_hat_i, y_i)"
    - "Weight gradient: dL / dW^(l) = A^(l-1)^T * dL / dZ^(l)"
    - "Gradient descent: theta_new = theta_old - eta * grad_theta L"
    - "Training memory: weights + optimizer states + activations"
    - "Fully connected layer FLOPs: 2 * input_dim * output_dim * batch_size"
