  formulas:
    - "Stationarity violation: P_train != P_deploy"
    - "Jensen-Shannon drift: D_JS(P_train || P_deploy)"
    - "Alignment gap: E[Proxy] - E[True]"
    - "Approval rate: (TP + FP) / (TP + FP + TN + FN)"
    - "True positive rate: TP / (TP + FN)"
    - "False positive rate: FP / (FP + TN)"
    - "Demographic parity: P(Y_hat = 1 | A = a) equal across groups"
    - "Equal opportunity: TPR equal across groups"
    - "Equalized odds: TPR and FPR equal across groups"
    - "epsilon-DP bound: Pr[M(D)=o] <= exp(epsilon) * Pr[M(D')=o]"
    - "Carbon emissions: energy_kWh * carbon_intensity_kg_per_kWh"
    - "GPU-hours/day: daily_queries * inference_latency_seconds / 3600"
    - "TCO: training cost + inference cost + operational cost"
