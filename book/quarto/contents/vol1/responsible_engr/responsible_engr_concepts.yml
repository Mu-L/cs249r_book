  methodologies:
    - Diagnose responsibility failures with the Data-Algorithm-Machine taxonomy
    - Run predeployment assessment across data, training, evaluation, deployment, and monitoring
    - Build disaggregated and intersectional evaluation with confidence intervals
    - Use stratified sampling or targeted collection to validate underrepresented subgroups
    - Apply slice-based, invariance, boundary, stress, and stakeholder red-team tests
    - Compute fairness metrics from confusion matrices and alert on disparities
    - Apply threshold adjustment, reweighting, or adversarial debiasing with explicit trade-offs
    - Select explainability mechanisms by domain and regulatory requirements
    - Design human review with calibrated escalation thresholds and reviewer monitoring
    - Monitor subgroup outcomes, input distributions, and user feedback after deployment
    - Calculate TCO and carbon impact across training, inference, and operations
    - Enforce governance with RBAC, encryption, privacy techniques, lineage, and audit logs
    - Implement consent, retention, and right-to-erasure workflows for raw and derived artifacts
    - Gate deployment with model cards, datasheets, and data cards
  formulas:
    - 'Stationarity violation: P_train != P_deploy'
    - 'Jensen-Shannon drift: D_JS(P_train || P_deploy)'
    - 'Alignment gap: E[Proxy] - E[True]'
    - 'Approval rate: (TP + FP) / (TP + FP + TN + FN)'
    - 'True positive rate: TP / (TP + FN)'
    - 'False positive rate: FP / (FP + TN)'
    - 'Demographic parity: P(Y_hat = 1 | A = a) equal across groups'
    - 'Equal opportunity: TPR equal across groups'
    - 'Equalized odds: TPR and FPR equal across groups'
    - 'epsilon-DP bound: Pr[M(D)=o] <= exp(epsilon) * Pr[M(D'')=o]'
    - 'Representation requirement: N_total = target_subgroup_examples / subgroup_fraction'
    - 'Aggregate utility tax: Extra FP Cost / (Baseline Successful-Hire Utility + Extra FP Cost) * Group Share'
    - 'Carbon emissions: energy_kWh * carbon_intensity_kg_per_kWh'
    - 'GPU-hours/day: daily_queries * inference_latency_seconds / 3600'
    - 'TCO: training cost + inference cost + operational cost'
    - \text{Gap} = E[\text{Proxy}] - E[\text{True}]
