  formulas:
  - I = \text{FLOP}/\text{byte}
  - \text{Achievable FLOPS} = \min\left(R_{\text{peak}},\ \text{BW} \times I\right)
  - I_{\text{ridge}} = R_{\text{peak}} / \text{BW}
  - T_{\text{mem}} = \text{Model bytes} / \text{Memory bandwidth}
  - T_{\text{comp}} = \text{FLOPs} / R_{\text{peak}}
  - T_{\text{transfer}} = \text{Data} / \text{Bandwidth}
  - D = A \times B + C
  - \text{MFU} = C_{\text{step}} / (R_{\text{peak}} \times T_{\text{step}}), \quad C_{\text{step}} \approx 6PN_{\text{tokens}}
  - \text{Pipeline bubble fraction} \approx (p - 1) / m
  - Q = \dot{m} \times c_p \times \Delta T
  - \text{PUE} = P_{\text{facility}} / P_{\text{IT}}
  - \eta_{\text{scaling}} = T_1 / (N \times T_N)
  - \tau_{\text{opt}} = \sqrt{2 \times T_{\text{write}} \times \text{MTBF}}
  - \text{Total training FLOPs} \approx 6PD
  - k \ge \lceil T_{\text{io}} / T_{\text{compute}} + 3\sigma_{\text{io}} / T_{\text{compute}} \rceil
