  formulas:
    - 2{,}048 \text{ GPUs} \times 4{,}096 \text{ tokens/GPU} \times 4 \text{ bytes/token} \div 0.2\text{s} \approx \mathbf{168 \text{ MB/s}}
    - 2{,}048 \text{ GPUs} \times 256 \text{ images/GPU} \times 150 \text{ KB/image} \div 0.2\text{s} \approx \mathbf{393 \text{ GB/s}}
    - \text{BW}_{\text{required}} = N_{\text{GPUs}} \times U_{\text{target}} \times \frac{D_{\text{vol,batch}}}{T_{\text{iteration}}}
    - \text{Data Stall \%} = \frac{T_{\text{step}} - T_{\text{compute}}}{T_{\text{step}}} \times 100
    - T_{\text{step}} = T_{\text{I/O}} + T_{\text{compute}} = 250 + 200 = 450 \text{ ms}
    - \text{Stall \%} = \frac{250}{450} = 55.6\%
    - T_{\text{step}} = \max(200, 250) = 250 \text{ ms}
    - D_{\text{prefetch,min}} = \left\lceil \frac{T_{\text{I/O,p99}}}{T_{\text{compute}}} \right\rceil
    - P(\text{no collision}) \approx e^{-n^2/2N} = e^{-32^2/2000} \approx 0.60
    - P(\text{contention}) = 1 - P(\text{no collision}) \approx \mathbf{40\%}
    - T_{\text{step,no overlap}} = T_{\text{I/O}} + T_{\text{compute}}
    - T_{\text{step,overlapped}} = \max(T_{\text{compute}}, T_{\text{I/O}})
    - \text{Synthetic footprint} = \text{raw payload} \times (1 + \text{provenance overhead}) \times \text{verification passes}
