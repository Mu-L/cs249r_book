  formulas:
    - R_{\text{single}}(t) = e^{-\lambda t}
    - R_{\text{system}}(t) = \prod_{i=1}^{N} R_i(t) = \prod_{i=1}^{N} e^{-\lambda_i t}
    - R_{\text{system}}(t) = e^{-N\lambda t}
    - \text{MTBF}_{\text{system}} = \frac{1}{N\lambda} = \frac{\text{MTBF}_{\text{component}}}{N}
    - \tau_{\text{opt}} = \sqrt{2 \cdot T_{\text{write}} \cdot \text{MTBF}}
    - \text{FIT} = \frac{10^9}{\text{MTBF}}
    - R_{\text{system}} = \prod_{i=1}^{n} R_i
    - R_{\text{system}} = 1 - \prod_{i=1}^{n} (1 - R_i)
    - \lambda_{\text{GPU}} = \frac{1}{50,000} = 2.0 \times 10^{-5} \text{ failures/hour}
    - \lambda_{\text{PCIe}} = \frac{1}{200,000} = 0.5 \times 10^{-5} \text{ failures/hour}
    - \lambda_{\text{power/GPU}} = \frac{1}{8} \times \frac{1}{100,000} = 0.125 \times 10^{-5} \text{ failures/hour}
    - \lambda_{\text{network/GPU}} = \frac{1}{8} \times \frac{1}{150,000} = 0.083 \times 10^{-5} \text{ failures/hour}
    - \lambda_{\text{total/GPU}} = (2.0 + 0.5 + 0.125 + 0.083) \times 10^{-5} = 2.708 \times 10^{-5} \text{ failures/hour}
    - \lambda_{\text{cluster}} = 10,000 \times 2.708 \times 10^{-5} = 0.2708 \text{ failures/hour}
    - \text{MTBF}_{\text{cluster}} = \frac{1}{0.2708} = 3.69 \text{ hours}
    - T_{\text{timeout}} = H + k\sigma_d
    - O_{\text{ckpt}} = \frac{T_{\text{write}}}{\tau_{\text{opt}}} + \frac{T_{\text{pause}}}{\tau_{\text{opt}}}
    - T_{\text{recovery}} = T_{\text{detect}} + T_{\text{restart}} + T_{\text{load}} + T_{\text{warmup}}
    - \eta_{\text{new}} = \eta_{\text{base}} \times \sqrt{\frac{N_{\text{new}}}{N_{\text{base}}}}
    - A_{\text{system}} = 1 - (1 - A_{\text{single}})^R
