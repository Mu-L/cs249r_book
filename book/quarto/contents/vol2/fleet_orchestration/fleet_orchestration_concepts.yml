  formulas:
    - \text{Expected failures per day} = 4096 \times \frac{0.001}{365} \approx 0.01 \text{ GPU failures/day}
    - \frac{W_q}{1/\mu} = \frac{\rho}{1-\rho} \cdot \frac{1+C_s^2}{2}
    - \text{Priority}_{\text{effective}} = \text{Priority}_{\text{base}} \times \frac{F_{\text{target}}}{F_{\text{actual}} + \epsilon}
    - S_{\text{locality}} = \sum_{i < j} w(d(g_i, g_j))
    - C_{\text{effective}} = C_{\text{spot}} \times \frac{T_{\text{total}}}{T_{\text{productive}}}
    - \text{TCO}_{3\text{yr}} = C_{\text{cap}} + 3 \times C_{\text{ops}} + C_{\text{opp}}
    - Q_{\text{effective}} = \min\left(Q_{\text{team}},\ Q_{\text{department}} - \sum_{\text{other teams}} U_{\text{allocated}}\right)
    - 'At 60 percent utilization: 6,000 GPUs productive, 4,000 idle = $192,000/day wasted'
    - 'At 80 percent utilization: 8,000 GPUs productive, 2,000 idle = $96,000/day wasted'
    - 'Hours 0 to 2: 25 percent throughput \times 2 hours = 0.5 hours equivalent'
    - 'Hours 2 to 4: 50 percent throughput \times 2 hours = 1.0 hours equivalent'
    - 'Hours 4 to 8: 100 percent throughput \times 4 hours = 4.0 hours equivalent'
