  formulas:
    - T_{\text{total}} = T_{\text{compute}} + T_{\text{network}} + T_{\text{serialization}} + T_{\text{coordination}} + T_{\text{queuing}}
    - C_{\text{total}} = C_{\text{training}} + C_{\text{serving}} \times T_{\text{deployment}} \times Q_{\text{rate}}
    - L_{\text{lat}}(B) = T_{\text{fixed}} + B \times T_{\text{variable}}
    - X(B) = \frac{B}{L_{\text{lat}}(B)} = \frac{B}{T_{\text{fixed}} + B \times T_{\text{variable}}}
    - N_{\text{req}} = \lambda \cdot T_{\text{lat}}
    - S(B) = \alpha + \beta \cdot B
    - \mu_{\text{eff}}(B) = \frac{B}{S(B)} = \frac{B}{\alpha + \beta \cdot B}
    - E[T] = E[W] + E[S_{\text{batch}}] + E[S_{\text{compute}}]
    - E[B] = \min(B_{\text{max}}, \lambda \cdot T_{\text{max}})
    - B = \operatorname{arg\,min}_{B} E[T(B)] \quad \text{subject to} \quad \mu_{\text{eff}}(B) \geq \lambda
    - E[T(B)] = E[W(B)] + \frac{B}{2\lambda} + S(B)
    - E[W] = \frac{\lambda \cdot E[S^2]}{2(1 - \rho)}
    - \text{Throughput gain} \approx 1 + \frac{\text{CV}^2}{2}
    - W = 1 - \frac{C_{\text{useful}}}{C_{\text{traditional}}} = 1 - \frac{\bar{L}}{L_{\text{max}}}
    - \text{KV cache size} = 2 \times n_{\text{layers}} \times d \times S \times B \times s_{\text{elem}}
    - \text{Memory}_{\text{weights}} = P \times \frac{b}{8} \text{ bytes}
    - T_{\text{parallel}} = \frac{T_{\text{sequential}}}{N} + T_{\text{communication}}
    - T_{\text{allreduce}} = 2 \times \frac{(N-1)}{N} \times \frac{M}{\text{BW}}
    - E[\text{max queue}]_{\text{two choices}} = \Theta(\log \log n)
    - T_{\text{response}} = T_{\text{detect}} + T_{\text{decide}} + T_{\text{provision}} + T_{\text{warmup}}
    - \text{Decode throughput} \propto \frac{\text{Memory bandwidth}}{\text{Model size in bytes}}
