  formulas:
  - \mathcal{L}(N) = A N^{-\alpha} + B
  - \text{MTBF}_{\text{cluster}} = \frac{\text{MTTF}_{\text{GPU}}}{N}
  - R_{\text{fleet}} = (R_{\text{node}})^N
  - \text{CI} = \frac{\text{Bytes Transferred (Network)}}{\text{FLOPs Executed (Local)}}
  - \text{Ring All-Reduce traffic} \approx \frac{2(N-1)}{N} \times \text{gradient tensor size}
  - T_{\text{step}} = T_{\text{compute}} + T_{\text{comm}} + T_{\text{sync}}
  - \eta_{\text{fleet}} = \frac{T_{\text{compute}}}{T_{\text{compute}} + T_{\text{comm}} + T_{\text{sync}}}
  - T_{\text{step}}(N) = \frac{T_{\text{compute},1}}{N} + T_{\text{comm}}(N) + T_{\text{sync}}(N) - T_{\text{overlap}}
  - \eta_{p} = \frac{\text{Work (FLOPs)}}{E_{\text{Compute}} + E_{\text{Cooling}} + E_{\text{Network}}}
  - \eta_{\text{scaling}} = \frac{T_{\text{compute},1}/N}{T_{\text{step}}} = \frac{T_{\text{compute},1}}{N \times T_{\text{step}}}
