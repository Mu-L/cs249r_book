  formulas:
    - \text{ROI}_{\text{platform}} = \frac{N_{\text{models}} \times T_{\text{saved}} \times C_{\text{engineer}}}{C_{\text{platform}}}
    - \text{Paydown Priority} = \frac{\text{Impact} \times \text{Frequency} \times \text{Benefit}}{\text{Resolution Cost}}
    - T_{\text{freshness}} = T_{\text{available}} - T_{\text{event}}
    - '\text{Demographic Parity: } |P(\hat{Y}=1|A=a) - P(\hat{Y}=1|A=b)| < \epsilon'
    - '\text{Equalized Odds: } |P(\hat{Y}=1|Y=y, A=a) - P(\hat{Y}=1|Y=y, A=b)| < \epsilon'
    - t_{\text{stage}} = \frac{n_{\text{samples\_needed}}}{r_{\text{requests}} \times p_{\text{stage}}}
    - t_{1\%} = \frac{10,000}{1,000,000 \times 0.01} = 1 \text{ hour}
    - t_{5\%} = \frac{10,000}{1,000,000 \times 0.05} = 0.2 \text{ hours} = 12 \text{ minutes}
    - z = \frac{0.015 - 0.010}{\sqrt{0.0125 \times 0.9875 \times (2/100000)}} = \frac{0.005}{0.000497} \approx 10.1
    - n = \frac{(Z_{\alpha_{\text{sig}}} + Z_{\beta_{\text{stat}}})^2 \times 2p(1-p)}{\delta^2}
    - n = \frac{(1.96 + 0.84)^2 \times 2 \times 0.05 \times 0.95}{0.005^2}
    - n = \frac{7.84 \times 0.095}{0.000025} = \frac{0.7448}{0.000025} = 29,792
    - n = \frac{7.84 \times 2 \times 0.01 \times 0.99}{0.0005^2} = \frac{0.1552}{0.00000025} = 620,800
    - z = \frac{\hat{p}_B - \hat{p}_A}{\sqrt{\hat{p}(1-\hat{p})(\frac{1}{n_A} + \frac{1}{n_B})}}
    - \alpha_{\text{sig}}' = 1 - (1-\alpha_{\text{sig}})^{1/k}
    - \text{DEFF} \approx 1 + (m - 1)\rho
    - R_{\text{rollout}} = P_{\text{regression}} \times I_{\text{regression}} \times E_{\text{exposure}}
    - P(\text{at least one false alert}) = 1 - (1 - \alpha_{\text{fp}})^{N_{\text{tests}}}
    - \text{PSI} = \sum_{i=1}^{n} (A_i - E_i) \times \ln\left(\frac{A_i}{E_i}\right)
    - U_{\text{platform}} = \frac{\sum_{i} U_i \times R_i}{\sum_{i} R_i}
    - \text{MPG} = \text{Scheduling Efficiency} \times \text{Runtime Efficiency} \times \text{Program Efficiency}
    - \text{Cost per inference} = \frac{\text{Total serving cost}}{\text{Total inferences served}}
    - \text{TCO}_{\text{ML}} = C_{\text{train}} + C_{\text{infer}} + C_{\text{data}} + C_{\text{iter}}
    - C_{\text{train}} = N_{\text{GPU}} \times T_{\text{hours}} \times R_{\text{GPU/hr}} \times \text{PUE} \times (1 + F_{\text{fail}})
    - C_{\text{infer}} = \frac{Q_{\text{daily}} \times T_{\text{infer,avg}}}{U_{\text{GPU}} \times B_{\text{eff}}} \times R_{\text{GPU/hr}} \times 365
    - C_{\text{data}} = C_{\text{storage}} + C_{\text{egress}} + C_{\text{process}}
    - C_{\text{iter}} = N_{\text{exp}} \times T_{\text{exp}} \times (C_{\text{engineer}} + C_{\text{compute}})
    - T_{\text{breakeven}} = \frac{C_{\text{optimization}}}{S_{\text{monthly}}}
