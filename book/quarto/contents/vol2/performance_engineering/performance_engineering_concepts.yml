  formulas:
    - T = \frac{D_{\text{vol}}}{\text{BW}} + \frac{O}{R_{\text{peak}} \cdot \eta_{\text{hw}}} + L_{\text{lat}}
    - T \approx \max\left( \frac{O}{R_{\text{peak}} \cdot \eta_{\text{hw}}}, \; \frac{D_{\text{vol}}}{\text{BW}} \right) + L_{\text{lat}}
    - \text{Achievable FLOP/s} = \min(R_{\text{peak}}, \; \text{BW} \times I)
    - I_{\text{ridge}} = \frac{R_{\text{peak}}}{\text{BW}}
    - I_{\text{ridge}}^{\text{H100, FP16}} = \frac{989 \text{ TFLOP/s}}{3.35 \text{ TB/s}} \approx 295 \text{ FLOP/byte}
    - I_{\text{decode}}(\text{batch}) = \frac{2 \times \text{params} \times \text{batch}}{\text{params} \times \text{bytes\_per\_param} + \text{batch} \times d \times \text{bytes\_per\_elem}}
    - I = \frac{17.5 \times 10^9 \text{ FLOP}}{17.5 \times 10^9 \text{ bytes}} = 1.0 \text{ FLOP/byte}
    - t_{\text{decode}} = \frac{17.5 \text{ GB}}{3.35 \text{ TB/s}} \approx 5.2 \text{ ms per token}
    - \text{ITL}_{\text{effective}} = \frac{4 + 32}{3.5} \approx 10.3 \text{ ms per token}
    - Y = \text{LayerNorm}(\text{GELU}(XW + b))
    - \text{Attention}(Q, K, V) = \text{Softmax}(QK^T / \sqrt{d_k})V
    - S_t = Q_{\text{block}} K_t^T
    - m_{\text{new}} = \max(m_{\text{old}}, \max(S_t))
    - s_i = \frac{x_{\max,i} - x_{\min,i}}{2^b - 1}
    - \text{KV cache bytes} = 2 \times \text{layers} \times \text{kv\_heads} \times \text{head\_dim} \times \text{seq\_len} \times \text{bytes}
    - t_{\text{AllReduce}} \approx 2 \times \frac{\text{gradient bytes}}{\text{bandwidth}}
    - \text{MFU} = \frac{6 \times P \times D}{N \times R_{\text{peak}} \times T}
    - \text{MBU} = \frac{\text{achieved memory bandwidth}}{\text{peak memory bandwidth}}
