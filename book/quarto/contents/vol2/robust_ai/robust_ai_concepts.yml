  formulas:
    - \text{PSI} = \sum_{i=1}^{k} (p_i - q_i) \times \ln\left(\frac{p_i}{q_i}\right)
    - \mathcal{D}_{\text{KL}}(P \lVert Q) = \int_{-\infty}^{\infty} p(x) \ln\left(\frac{p(x)}{q(x)}\right) dx
    - D_{n,m} = \sup_x |F_n(x) - G_m(x)|
    - D_{n,m} > c(\alpha) \sqrt{\frac{n + m}{nm}}
    - \chi^2 = \sum_{i=1}^{k} \frac{(O_i - E_i)^2}{E_i}
    - \text{PSI}_{\text{country}} = 0.0118 + 0.0021 + 0.0007 + 0.0036 + 0.0470 = 0.065
    - \mathcal{D}_{\text{KL}} = \ln\frac{\sigma_Q}{\sigma_P} + \frac{\sigma_P^2 + (\mu_P - \mu_Q)^2}{2\sigma_Q^2} - \frac{1}{2}
    - \mathcal{D}_{\text{KL}} = \ln\frac{1.3}{1.1} + \frac{1.1^2 + (4.2 - 4.5)^2}{2 \times 1.3^2} - 0.5 = 0.167 + 0.385 - 0.5 = 0.052
    - D_{10000,10000} = 0.089
    - P(\geq 1) = 1 - (1 - p)^N
    - \mathcal{D}_{\text{JS}}(P \lVert Q) = \frac{1}{2} \mathcal{D}_{\text{KL}}(P \lVert M) + \frac{1}{2} \mathcal{D}_{\text{KL}}(Q \lVert M)
    - M = \frac{1}{2}(P + Q)
    - x_{\text{adv}} = x + \epsilon \cdot \text{sign}\big(\nabla_x \mathcal{L}(\theta, x, y)\big)
    - g(x) = \operatorname{arg\,max}_c \mathbb{P}(f(x+\delta) = c), \delta \sim \mathcal{N}(0, \sigma^2 I)
    - R = \frac{\sigma}{2}\left(\Phi^{-1}(p_A) - \Phi^{-1}(p_B)\right)
    - R = \sigma\Phi^{-1}(p_A)
    - I(z, z_{\text{test}}) \approx -\nabla_\theta \mathcal{L}(z_{\text{test}}, \hat{\theta})^T H_{\hat{\theta}}^{-1} \nabla_\theta \mathcal{L}(z, \hat{\theta})
    - \min_\theta \max_{\|\delta\| \leq \epsilon} \mathcal{L}(f_\theta(x + \delta), y)
