findings:
- id: appendix-algorithm-adam-state-bytes-local
  severity: medium
  lines: 117,371,423,480
  issue: 'The appendix encodes Adam optimizer byte overhead as local text/literals:
    8-12 bytes in the setup cell and 12 bytes in the GPT-2 worked example, even though
    MLSysIM already exposes BYTES_ADAM_STATE for the two FP32 moment tensors and BYTES_FP32
    for the FP32 master weight.'
  recommended_change: Derive the displayed 8-12 byte range from BYTES_ADAM_STATE and
    BYTES_FP32, and derive the GPT-2 full Adam value as 3 * BYTES_FP32 or through
    a named full-Adam training-state helper.
  mlsysim_target: mlsysim.core.constants.BYTES_ADAM_STATE; mlsysim.core.constants.BYTES_FP32;
    proposed BYTES_ADAM_FP32_FULL_STATE or training-state formula helper
  render_impact: No rendered change expected; 8-12 bytes, 12-16 total nonactivation
    bytes, and GPT-2 optimizer memory should remain the same.
  prose_validation: The adjacent prose remains valid because it describes momentum,
    variance, and optional FP32 master weights rather than a scenario-specific assumption.
- id: appendix-algorithm-transformer-activation-factor-local
  severity: low
  lines: 380-383,428-431
  issue: The GPT-2 training-memory cell uses a local retained-activation factor of
    12 for transformer training memory. The prose explains the decomposition, but
    the convention is reusable and should not drift across chapters.
  recommended_change: Add or reuse an MLSysIM formula helper for transformer training
    activation memory, with an explicit default retained-activation factor and documented
    components.
  mlsysim_target: mlsysim.physics.transformer_training_activation_bytes(...)
    or proposed mlsysim.core.constants.TRANSFORMER_TRAINING_ACTIVATION_FACTOR
  render_impact: No rendered change expected if the helper preserves the current 12x
    convention.
  prose_validation: The narrative remains true because it already spells out input
    activations, QKV projections, attention output, FFN intermediate, output, and
    norms/masks as the source of the factor.
