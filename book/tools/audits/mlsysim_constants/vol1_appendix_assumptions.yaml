findings:
- id: appendix-adam-training-bytes-local
  severity: medium
  lines: 61-69,101-103
  issue: The mixed-precision Adam memory example hard-codes 16 bytes per parameter
    even though the value is a reusable training-state convention built from precision
    byte widths and optimizer state bytes.
  recommended_change: Derive the value from MLSysIM precision constants and a shared
    Adam training-state helper, or expose a named mixed-precision Adam bytes-per-parameter
    constant/helper.
  mlsysim_target: mlsysim.core.constants.BYTES_FP16 plus TrainingMemoryModel.OPTIMIZER_STATE_BYTES['adam'],
    or a new mlsysim.physics mixed_precision_adam_bytes_per_param helper
  render_impact: No rendered change expected if the helper encodes the current 2 +
    2 + 12 byte accounting.
  prose_validation: The prose remains narratively valid because it already explains
    the byte decomposition.
- id: appendix-gpt3-reference-cluster-size-local
  severity: medium
  lines: 56-58,70-71,105
  issue: The GPT-3 electricity estimate imports GPT3_TRAINING_DAYS_REF, whose constant
    comment says it is days on 1,024 A100s, but the 1,024 accelerator count is a local
    literal in the appendix.
  recommended_change: Add and use a GPT3_TRAINING_ACCELERATORS_REF constant or a structured
    GPT-3 reference training profile that bundles ops, duration, accelerator type,
    and accelerator count.
  mlsysim_target: mlsysim.core.constants.GPT3_TRAINING_ACCELERATORS_REF or a model
    training reference profile
  render_impact: No rendered change expected if initialized to 1024.
  prose_validation: The A100-equivalent normalization remains true and becomes traceable
    to the same source as the reference duration.
- id: appendix-hours-per-day-local
  severity: low
  lines: 63-71,105
  issue: The electricity formula hard-codes 24 h/day even though MLSysIM already defines
    HOURS_PER_DAY and related time scalars.
  recommended_change: Import HOURS_PER_DAY from MLSysIM and use it in the cost calculation.
  mlsysim_target: mlsysim.core.constants.HOURS_PER_DAY
  render_impact: No rendered change expected.
  prose_validation: The visible formula's 24 h/day term remains correct while avoiding
    a local calendar literal.
