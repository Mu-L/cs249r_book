findings:
- id: appendix-dam-fp16-byte-width
  severity: low
  lines: 24-27, 46, 67, 432
  issue: The cell hardcodes FP16 as 2 bytes even though MLSysIM already exports BYTES_FP16.
  recommended_change: Import BYTES_FP16 and set ex2_bytes_per_param = BYTES_FP16.m_as(byte),
    matching the volume 2 D.A.M appendix pattern.
  mlsysim_target: mlsysim.core.constants.BYTES_FP16
  render_impact: Preserves the rendered ~14 GB model-size value.
  prose_validation: The adjacent explanation that FP16 weights must be loaded every
    forward pass remains narratively valid.
- id: appendix-dam-transformer-decode-flops-rule
  severity: medium
  lines: 47, 64, 420
  issue: The transformer decode rule of thumb, 2 FLOPs per parameter per generated
    token, is encoded as a local literal.
  recommended_change: Add or reuse an MLSysIM helper such as calc_transformer_decode_flops(params_or_model)
    so chapters do not repeat the forward/decode FLOP multiplier by hand.
  mlsysim_target: mlsysim.core.formulas.calc_transformer_decode_flops or shared TRANSFORMER_DECODE_FLOPS_PER_PARAM
  render_impact: Preserves the current 14 TFLOPs decode-step value if initialized
    with the same rule.
  prose_validation: The low H100 utilization and Data-bottleneck-candidate narrative
    remains valid because only the source of the formula changes.
- id: appendix-dam-ridge-threshold-should-be-derived
  severity: medium
  lines: 231-234
  issue: The rules-of-thumb prose uses a fixed arithmetic-intensity threshold of 100
    FLOP/byte while the same paragraph says the precise boundary is hardware-specific.
  recommended_change: Source a displayed H100 ridge point from H100_FLOPS_FP16_TENSOR
    and H100_MEM_BW, or expose a small MLSysIM ridge-point helper for the D.A.M appendix.
  mlsysim_target: mlsysim.Hardware.H100.ridge_point() or H100_FLOPS_FP16_TENSOR /
    H100_MEM_BW
  render_impact: Would intentionally change the rendered heuristic if the prose switches
    from generic 100 FLOP/byte to an H100-specific ridge point; the volume 2 appendix
    renders about 295 FLOP/byte.
  prose_validation: The surrounding warning that the threshold is approximate remains
    valid, but the H100-specific version would better support the stated compute-the-ridge
    guidance.
- id: appendix-dam-scorecard-thresholds-helper
  severity: medium
  lines: 367-371, 450-452
  issue: The D.A.M scorecard and exercise answer repeat rubric thresholds for I/O
    overhead, active-parameter sparsity, MFU, and low utilization as prose literals.
  recommended_change: Add a small MLSysIM D.A.M diagnostics profile or threshold helper
    for scorecard cutoffs; reuse existing MFU_TRAINING_LOW/HIGH for the MFU row.
  mlsysim_target: mlsysim.core.defaults.MFU_TRAINING_LOW/HIGH plus new DAM_SCORECARD_*
    threshold constants
  render_impact: Can preserve the rendered 10 percent, 1 percent, 50 percent, 30 percent,
    50 percent, and 80 percent thresholds if initialized with current values.
  prose_validation: The scorecard and hardware-upgrade diagnostic questions remain
    narratively valid while becoming traceable.
