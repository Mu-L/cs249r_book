findings:
- id: appendix-data-network-bandwidths-local
  severity: medium
  lines: 55-57,79-87,126-132
  issue: The data-gravity cell constructs 10 Gbps and 100 Gbps links from local numeric
    literals even though MLSysIM already exposes NETWORK_10G_BW and NETWORK_100G_BW;
    the 1 Gbps standard-WAN reference is likewise a reusable network baseline if this
    table is meant to be source-of-truth driven.
  recommended_change: Import NETWORK_10G_BW and NETWORK_100G_BW from MLSysIM, and
    either keep 1 Gbps as a local scenario assumption or add NETWORK_1G_BW for the
    standard-WAN reference.
  mlsysim_target: mlsysim.core.constants.NETWORK_10G_BW; mlsysim.core.constants.NETWORK_100G_BW;
    optional proposed mlsysim.core.constants.NETWORK_1G_BW
  render_impact: No rendered change expected if the constants preserve 10 Gbps and
    100 Gbps, and optional NETWORK_1G_BW is initialized to 1 Gbps.
  prose_validation: The table narrative remains valid because it already labels the
    columns as standard WAN, high-end WAN, and direct connect bandwidth tiers.
- id: appendix-data-int32-width-local
  severity: low
  lines: 326-333,360-362
  issue: The projection-waste example hard-codes a 4-byte integer width even though
    MLSysIM already defines BYTES_INT32 for this precision/storage width.
  recommended_change: Import BYTES_INT32 and derive int_size_bytes from it instead
    of using a bare 4.
  mlsysim_target: mlsysim.core.constants.BYTES_INT32
  render_impact: No rendered change expected; the waste percentage should remain approximately
    99.6 percent.
  prose_validation: The adjacent prose remains valid because it describes extracting
    a 4-byte integer from a 1 KB row.
- id: appendix-data-psi-threshold-local
  severity: medium
  lines: 466-486,630-634
  issue: The PSI retraining threshold is a local 0.2 literal in the appendix, while
    the same threshold is reused across data engineering, ML workflow, and MLOps prose
    as a standard drift-alert convention.
  recommended_change: Add or reuse an MLSysIM drift-threshold constant/default for
    the significant PSI threshold and format this appendix value from that source.
  mlsysim_target: proposed mlsysim.core.constants.PSI_SIGNIFICANT_DRIFT_THRESHOLD
    or Ops.Monitoring.PsiWarnThreshold
  render_impact: No rendered change expected if initialized to 0.2.
  prose_validation: The narrative remains valid because the text explicitly says PSI
    above 0.2 typically triggers retraining or model review.
- id: appendix-data-precision-limits-local-prose
  severity: low
  lines: 666-776
  issue: The LogSumExp worked example hard-codes precision dynamic-range facts in
    prose, including FP32 maximum around 3.4e38, FP16 maximum 65,504, and the FP16
    overflow point near exp(12). These are durable precision facts and could drift
    from other precision tables.
  recommended_change: Add MLSysIM precision metadata constants or a registry for max
    finite values and use them to format the numerical-stability prose when possible.
  mlsysim_target: proposed mlsysim.core.constants.FP32_MAX_FINITE and FP16_MAX_FINITE,
    or a mlsysim precision metadata registry
  render_impact: No rendered change expected if constants match IEEE FP32 and FP16
    limits.
  prose_validation: The explanation remains valid because the worked logits are intentionally
    large and the prose only needs the precision limits to justify overflow risk.
