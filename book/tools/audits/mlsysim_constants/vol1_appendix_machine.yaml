findings:
- id: appendix-machine-register-latency-local
  severity: medium
  lines: 83-85,249,413-415,460,907,1000
  issue: The register latency baseline is hard-coded as 0.3 ns in both the NumbersToKnow
    and AppendixMachineSetup cells, while the surrounding tables treat it as a durable
    memory-hierarchy constant.
  recommended_change: Add a canonical MLSysIM register-latency constant, such as LATENCY_REGISTER,
    and derive the HBM/SSD register ratios and analogy labels from it.
  mlsysim_target: proposed mlsysim.core.constants.LATENCY_REGISTER
  render_impact: No rendered change expected if initialized to 0.3 ns.
  prose_validation: The memory-hierarchy narrative remains valid because the prose
    already presents register latency as a reference hardware baseline.
- id: appendix-machine-adam-and-transformer-rules-local-prose
  severity: medium
  lines: 155-157,212-223
  issue: 'The top reference tables hard-code reusable ML-systems rules: 16 bytes per
    parameter for mixed-precision Adam training, about 2 FLOPs per parameter per inference
    token, and about 6 FLOPs per parameter per training token.'
  recommended_change: Render the memory rule from BYTES_FP16, BYTES_FP32, BYTES_ADAM_STATE,
    and a shared mixed-precision Adam helper; render the FLOP rules from CHINCHILLA_COMPUTE_CONSTANT
    and a transformer inference FLOPs helper or named coefficient.
  mlsysim_target: mlsysim.core.constants.BYTES_FP16, BYTES_FP32, BYTES_ADAM_STATE,
    CHINCHILLA_COMPUTE_CONSTANT; proposed transformer_inference_flops_per_token helper
  render_impact: No rendered change expected; 16 bytes/parameter, 7B -> 112 GB, ~14
    GFLOPs/token, and 4 x 10^22 training FLOPs should remain the same.
  prose_validation: The adjacent prose is decompositional and remains narratively
    correct when driven by shared constants.
- id: appendix-machine-cache-size-specs-local
  severity: medium
  lines: 390-391,473,479,922
  issue: H100 L2 cache size and TPU v5p L2/SRAM size are local literals even though
    they are hardware SKU specs in the modern hardware cheat sheet.
  recommended_change: Add cache/SRAM capacity fields to MLSysIM hardware profiles
    or expose H100_L2_CACHE_MB and TPUV5P_L2_OR_SRAM_MB constants, then use those
    in the cheat-sheet row.
  mlsysim_target: proposed mlsysim.core.constants.H100_L2_CACHE_MB and TPUV5P_L2_OR_SRAM_MB,
    or structured hardware registry cache metadata
  render_impact: No rendered change expected if initialized to 50 MB and 100 MB.
  prose_validation: The row remains a current-reference hardware spec; centralizing
    it reduces drift with the rest of the H100/TPU v5p values already in MLSysIM.
- id: appendix-machine-physical-hierarchy-energy-local
  severity: medium
  lines: 489-498,998-1008
  issue: The physical hierarchy energy-per-32b column is rendered from local string
    literals, even though several constituent energy constants already exist in MLSysIM
    and the storage/network entries document reusable conversion assumptions.
  recommended_change: Derive register, L1, L2, and DRAM values from MLSysIM energy
    constants; derive network from NETWORK_ENERGY_1KB_PJ; add an NVMe/SSD energy-per-byte
    or per-32b helper for the storage row.
  mlsysim_target: mlsysim.core.constants.ENERGY_REG_PJ, ENERGY_SRAM_L1_PJ, ENERGY_SRAM_L2_PJ,
    ENERGY_DRAM_ACCESS_PJ, NETWORK_ENERGY_1KB_PJ; proposed NVME_SSD_ENERGY_PER_32B_PJ
    or energy_per_32b helper
  render_impact: No rendered change expected if the helper preserves the current displayed
    values, including approximate labels for storage and network.
  prose_validation: The silicon-contract narrative remains valid because it depends
    on order-of-magnitude hierarchy, not local string formatting.
- id: appendix-machine-training-time-coefficients-local
  severity: medium
  lines: 761,771-777,803-819
  issue: The training time example hard-codes the 6PD training FLOPs coefficient and
    40 percent MFU, despite MLSysIM containing traceable training compute and sustained-MFU
    defaults.
  recommended_change: Use CHINCHILLA_COMPUTE_CONSTANT or a training_flops(params,
    tokens) helper for the 6PD term, and source the 0.40 utilization from REFERENCE_MFU_SUSTAINED
    or an explicit traceable training-efficiency default.
  mlsysim_target: Literature.Chinchilla.ComputeConstant, mlsysim.core.calibration.REFERENCE_MFU_SUSTAINED,
    or mlsysim.physics.training_flops
  render_impact: No rendered change expected if the constants remain 6 and 0.40.
  prose_validation: The 2PD + 4PD explanation and 30-50 percent utilization range
    remain aligned with the same displayed training-time result.
- id: appendix-machine-bits-per-byte-local
  severity: low
  lines: 1090-1100,1113-1120
  issue: The bandwidth-latency example hard-codes byte-to-bit conversion factors as
    8 and 8e9 in the transmission-time calculation and rendered equation.
  recommended_change: Use a shared BITS_PER_BYTE constant or pint byte-to-bit unit
    conversion inside an MLSysIM bandwidth-latency helper.
  mlsysim_target: proposed mlsysim.core.constants.BITS_PER_BYTE or pint unit conversion
    helper
  render_impact: No rendered change expected; the 0.8 microsecond packet transmission
    and 800 ms large-transfer term should remain unchanged.
  prose_validation: The latency-bound versus bandwidth-bound conclusion remains valid
    because only the unit conversion source changes.
notes:
- No code or prose files were edited for this audit; only this YAML packet was added.
- Amdahl, Gustafson, Little's Law, GEMM/ReLU roofline, and bandwidth-latency workload
  values were classified as local scenario assumptions unless they represented reusable
  unit conversions or MLSysIM-wide conventions.
- Several important hardware values in this chapter are already sourced from MLSysIM,
  including A100/H100/TPU v5p peak compute, HBM bandwidth/capacity, interconnect bandwidth,
  latency constants, energy constants, and time/scaling units.
