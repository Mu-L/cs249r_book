findings:
- id: mobilenet-edge-profile-missing
  severity: high
  lines: 49-101,1663-1728,3142-3195,4395-4457
  issue: 'MobileNetV2 deployment metrics are repeated as local literals: EdgeTPU vs
    CPU latency, Raspberry Pi FP32/INT8 latency, active power, end-to-end latency,
    and quality metrics.'
  recommended_change: Add a clean MLSysIM benchmark/profile object for MobileNetV2
    edge deployment, with separate model-size derivations, hardware identities, active-power
    measurements, and quality metrics.
  mlsysim_target: new mlsysim.benchmarks or profile registry keyed by model, hardware,
    precision, scenario
  render_impact: Can preserve all current rendered values if the profile is initialized
    with the chapter's illustrative values.
  prose_validation: The prose already cautions that values are illustrative; centralizing
    them improves traceability without changing the narrative.
- id: precision-byte-literals
  severity: low
  lines: 49-101,1663-1728,2363-2438,2960-3004,5121-5166
  issue: FP32/FP16/INT8 byte widths are hard-coded as 4, 2, or 1 in multiple cells
    despite MLSysIM precision byte constants.
  recommended_change: Use BYTES_FP32, BYTES_FP16, BYTES_INT8, and model.size_in_bytes(...)
    where available.
  mlsysim_target: mlsysim.core.constants.BYTES_FP32/BYTES_FP16/BYTES_INT8 and Models.*.size_in_bytes
  render_impact: No rendered changes expected.
  prose_validation: Compression and energy explanations remain true.
- id: roofline-example-duplicates-bert-model-specs
  severity: medium
  lines: 633-836
  issue: The introductory roofline example hard-codes BERT FLOPs and FP32 weight size
    even though the worked BERT cell already retrieves these from MLSysIM.
  recommended_change: Replace bert_flops_b and bert_weight_mb with Models.Language.BERT_Base.inference_flops
    and size_in_bytes(BYTES_FP32), or reuse BertRoofline values.
  mlsysim_target: mlsysim.Models.Language.BERT_Base
  render_impact: No rendered change expected if the registry values match the current
    22 B FLOPs and 440 MB.
  prose_validation: BERT memory-bound prose remains true.
- id: edge-and-power-envelope-data-untracked
  severity: medium
  lines: 2625-2682
  issue: The power differentials figure uses broad Tiny/Edge/Datacenter/Training min-max
    power envelopes as local arrays without provenance or a reusable source.
  recommended_change: Create an audited power-envelope data table or MLSysIM system-envelope
    registry, then generate the figure from that source.
  mlsysim_target: new mlsysim.systems/power_envelopes registry or book/tools data
    table
  render_impact: No rendered change expected if seeded with the current ranges.
  prose_validation: The six-order-of-magnitude lesson remains true.
- id: pcie-effective-bandwidth-should-be-sourced
  severity: medium
  lines: 2960-3004
  issue: The cold-start lower-bound cell uses 25 GB/s effective PCIe 4.0 bandwidth
    while MLSysIM defines raw PCIE_GEN4_BW as 32 GB/s.
  recommended_change: Represent this as PCIE_GEN4_BW times an explicit effective-bandwidth
    efficiency, or add a named PCIE_GEN4_EFFECTIVE_BW constant with provenance.
  mlsysim_target: mlsysim.core.constants.PCIE_GEN4_BW plus new effective-bandwidth
    factor
  render_impact: Using raw 32 GB/s would change 560 ms to about 438 ms; preserving
    the rendered value requires keeping the effective 25 GB/s assumption.
  prose_validation: The footnote says effective bandwidth, so an explicit effective
    source keeps the prose true.
- id: imagenet-history-repeated-local-data
  severity: low
  lines: 4281-4353,4951-5087
  issue: ImageNet historical error values are stored once in the figure and again
    in the fallacies/pitfalls setup.
  recommended_change: Move the historical benchmark series into an audited chapter
    data table and consume it from both cells.
  mlsysim_target: book/tools audited data table; not necessarily MLSysIM core
  render_impact: No rendered changes expected.
  prose_validation: Benchmark-saturation prose remains true and less drift-prone.
- id: availability-downtime-derived-local-literal
  severity: low
  lines: 4951-5087
  issue: The fallacies cell hard-codes 43 minutes/month downtime next to 99.9 percent
    availability instead of deriving it.
  recommended_change: Derive downtime from availability and an explicit month length
    assumption.
  mlsysim_target: formula helper or local derived expression; no new system constant
    required
  render_impact: No rendered change expected for a 30-day month.
  prose_validation: Availability prose remains true.
- id: generic-accelerator-power-should-name-source
  severity: low
  lines: 1912-1964
  issue: The inference-energy example uses 300 W as a typical accelerator power literal;
    this matches MLSysIM V100_TDP but the prose does not name a hardware source.
  recommended_change: Either source the value from Hardware.V100.tdp or rename it
    as an explicit scenario power assumption.
  mlsysim_target: mlsysim.Hardware.V100.tdp or scenario-local variable
  render_impact: No rendered change expected if V100 is intended.
  prose_validation: The Power x time identity remains true.
notes:
- No code files were edited for this audit; only this YAML packet was added.
- Cells using Hardware.A100/H100, Models.BERT/GPT3/AnomalyDetector/MobileNetV2, and
  MLSysIM energy constants mostly already satisfy the source-of-truth goal.
- Several empirical benchmark values are better centralized in benchmark/profile data
  rather than mlsysim.core.constants, because they depend on model, hardware, precision,
  workload, and measurement protocol.
