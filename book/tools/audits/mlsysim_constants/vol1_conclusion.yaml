findings:
- id: conclusion-roofline-llama-display-duplicates
  severity: low
  lines: 653-654, 675-679
  issue: The cost-of-a-token cell loads Models.Language.Llama2_70B but still hardcodes
    the rendered 70-billion parameter display strings.
  recommended_change: Format llama_params_count_str and llama_params_prose_str from
    ConclusionRoofline.model.parameters instead of local MarkdownStr literals.
  mlsysim_target: mlsysim.Models.Language.Llama2_70B.parameters
  render_impact: Preserves the rendered "70 billion" and "70-billion-parameter" text.
  prose_validation: The adjacent Llama 2 70B memory-bound narrative remains valid.
- id: conclusion-roofline-decode-flops-helper
  severity: medium
  lines: 641-647, 666-670
  issue: The roofline cell locally encodes the transformer decode rule of thumb, 2
    FLOPs per parameter per token, and manually repeats the memory/compute bottleneck
    calculation even though MLSysIM owns related roofline helpers.
  recommended_change: Add or reuse a clean MLSysIM helper for transformer decode FLOPs
    and route the memory/compute comparison through mlsysim.core.formulas.calc_bottleneck.
  mlsysim_target: mlsysim.core.formulas.calc_transformer_decode_flops (new) plus mlsysim.core.formulas.calc_bottleneck
  render_impact: Preserves 140 GFLOPs, H100 memory/compute times, and the displayed
    memory-bound ratio if the helper implements the current 2P decode convention.
  prose_validation: The cost-of-a-token callout remains narratively correct; sourcing
    the formula makes the repeated LLM inference rule auditable.
