findings:
- id: data-selection-chinchilla-constants-local
  severity: medium
  lines: 307-355,4375-4427
  issue: 'The chapter hardcodes Chinchilla-related constants: the 6PD compute multiplier,
    the 20 tokens/parameter optimum, and local 10/40 diagnostic thresholds.'
  recommended_change: Use CHINCHILLA_COMPUTE_CONSTANT and CHINCHILLA_TOKENS_PER_PARAM
    from MLSysIM defaults, and add traceable CHINCHILLA_DATA_STARVED_TOKENS_PER_PARAM
    and CHINCHILLA_DIMINISHING_TOKENS_PER_PARAM defaults if the 10/40 thresholds remain
    canonical.
  mlsysim_target: mlsysim.core.defaults.CHINCHILLA_COMPUTE_CONSTANT, CHINCHILLA_TOKENS_PER_PARAM,
    CHINCHILLA_DATA_STARVED_TOKENS_PER_PARAM, CHINCHILLA_DIMINISHING_TOKENS_PER_PARAM
  render_impact: Preserves rendered values if new thresholds match the current literals.
  prose_validation: The Chinchilla diagnostic prose remains true and becomes traceable.
- id: data-selection-llama2-training-tokens-missing
  severity: medium
  lines: 4375-4427
  issue: The LLaMA-2 70B training-token count is local even though it is model metadata
    used for a D/P diagnostic.
  recommended_change: Add LLAMA2_70B_TRAINING_TOKENS or a training_tokens field on
    Models.Llama2_70B and compute the ratio from that.
  mlsysim_target: mlsysim.core.constants.LLAMA2_70B_TRAINING_TOKENS or mlsysim.Models.Llama2_70B.training_tokens
  render_impact: Preserves the rendered near-29 D/P ratio if initialized to 2T tokens.
  prose_validation: The LLaMA-2 near-optimal comparison remains true.
- id: data-selection-dataset-counts-should-use-registry
  severity: low
  lines: 2062-2147,3225-3281
  issue: CIFAR-10 and ImageNet dataset sizes are hardcoded in cells despite existing
    MLSysIM dataset constants.
  recommended_change: Use CIFAR10_IMAGES in the FixMatch cell and IMAGENET_IMAGES
    in the data-echoing cell; keep rounded display where the prose only needs approximate
    values.
  mlsysim_target: mlsysim.core.constants.CIFAR10_IMAGES and mlsysim.core.constants.IMAGENET_IMAGES
  render_impact: CIFAR-10 is unchanged; ImageNet echoing seconds shift slightly while
    rounded hours and conclusions remain unchanged.
  prose_validation: The FixMatch and data-echoing prose remains true; the echoing
    second counts should be re-rendered if exact seconds are displayed.
- id: data-selection-storage-tier-profile-missing
  severity: medium
  lines: 3126-3189
  issue: The random-access penalty table hardcodes HDD, SATA SSD, and NVMe sequential
    bandwidth and random IOPS as system reference values.
  recommended_change: Create a small MLSysIM storage-tier registry or constants for
    sequential throughput and random-read IOPS by tier, then derive random throughput
    and penalties from it.
  mlsysim_target: new mlsysim.storage.StorageTiers or mlsysim.core.constants storage
    tier profiles
  render_impact: Preserves the table if the new profiles are seeded with the current
    values; using existing NVME_SEQUENTIAL_BW would change the NVMe row.
  prose_validation: The cost-of-randomness narrative remains true, but exact penalties
    depend on the chosen reference devices.
- id: data-selection-kws-model-prose-static
  severity: low
  lines: 2555-2633
  issue: The KWS section prose names the DS-CNN lighthouse model and its 200 K parameter
    count as static prose rather than rendering from the MLSysIM model registry.
  recommended_change: Expose the KWS model metadata in the local cell with Models.Tiny.DS_CNN.parameters
    or KWS_DSCNN_PARAMS and render the parameter count from that source.
  mlsysim_target: mlsysim.Models.Tiny.DS_CNN.parameters or mlsysim.core.constants.KWS_DSCNN_PARAMS
  render_impact: Preserves the rendered 200 K value.
  prose_validation: The TinyML/KWS constraints remain true and become auditable.
- id: data-selection-benchmark-profiles-needed-for-throughput-literals
  severity: medium
  lines: 2841-2924,3225-3281
  issue: Selection scoring times and data-echoing pipeline/GPU throughputs are local
    empirical performance literals tied to model and hardware context.
  recommended_change: Move these to a benchmark/profile layer keyed by model, hardware,
    dataset, precision, and workload mode rather than core constants.
  mlsysim_target: new mlsysim.benchmarks or profile registry
  render_impact: Can preserve rendered values if profiles are initialized from the
    current chapter assumptions.
  prose_validation: The ROI and bottleneck lessons remain true, with clearer provenance
    for empirical timings.
- id: data-selection-duplicate-amortization-figure-values
  severity: low
  lines: 2218-2408
  issue: The foundation-amortization data and figure cells duplicate the same scratch/pretrain/fine-tune
    GPU-hour scenario values.
  recommended_change: Have the figure consume FoundationCostAmortization or FoundationAmortizationData
    values directly.
  mlsysim_target: local cell reuse; no new MLSysIM constant required
  render_impact: No rendered changes expected.
  prose_validation: The amortization story remains true and less drift-prone.
- id: data-selection-crowd-label-cost-local
  severity: low
  lines: 3349-3406
  issue: The ImageNet-scale cost breakdown uses USD 0.05 per crowd label locally,
    matching an existing MLSysIM labeling-cost constant.
  recommended_change: Use LABELING_COST_CROWD_HIGH for the crowd-label unit cost.
  mlsysim_target: mlsysim.core.constants.LABELING_COST_CROWD_HIGH
  render_impact: Preserves the rendered label cost and total.
  prose_validation: The data-cost-dominates-compute conclusion remains true.
notes:
- No code files were edited for this audit; only this YAML packet was added.
- Most chapter literals are scenario assumptions or empirical benchmark values rather
  than true MLSysIM system constants.
- Where empirical values are reusable, a benchmark/profile registry is cleaner than
  adding broad constants to mlsysim.core.constants.
