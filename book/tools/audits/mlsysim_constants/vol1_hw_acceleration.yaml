findings:
  - id: hwaccel-amdahl-cpu-int8-baseline
    severity: medium
    lines: "221-318"
    issue: H100 Amdahl speedup uses a local 247.0 hardware speedup even though it is derived from H100 INT8 throughput and an implied 8 TOPS CPU baseline.
    recommended_change: Derive with mlsysim.core.formulas.calc_amdahls_speedup and add a traceable CPU_BASELINE_TOPS_INT8 if the 8 TOPS baseline is reused.
    mlsysim_target: mlsysim.core.constants.CPU_BASELINE_TOPS_INT8
    render_impact: Should preserve the displayed 247x, 19.0x, and 4.9x values after rounding.
    prose_validation: The prose remains true because it already says the CPU baseline is approximate.
  - id: hwaccel-duplicate-cpu-reference-throughput
    severity: low
    lines: "49-89"
    issue: The opening CPU lower-bound throughput literal duplicates an existing MLSysIM CPU reference constant.
    recommended_change: Use CPU_FLOPS_FP32 for the 1 TFLOP/s lower bound; leave the 2 TFLOP/s upper bound as a scenario/range assumption unless a high-end CPU reference is added.
    mlsysim_target: mlsysim.core.constants.CPU_FLOPS_FP32
    render_impact: Preserves the rendered gap range.
    prose_validation: The 1-2 TFLOP/s prose remains valid as a range.
  - id: hwaccel-energy-hierarchy-local-horowitz
    severity: medium
    lines: "2588-2649"
    issue: The energy hierarchy figure hardcodes several Horowitz-style physical energy constants that mostly already exist in MLSysIM.
    recommended_change: Replace local literals with ENERGY_ADD_INT8_PJ, ENERGY_ADD_FP32_PJ, ENERGY_FLOP_FP32_PJ, and ENERGY_DRAM_ACCESS_PJ; add ENERGY_SRAM_8KB_READ_PJ if the 5.0 pJ SRAM read remains the intended value.
    mlsysim_target: mlsysim.core.constants
    render_impact: Existing constants preserve all matching labels; the SRAM label is preserved only if a new 5.0 pJ constant is added.
    prose_validation: The figure caption remains true and becomes auditable.
  - id: hwaccel-systolic-energy-local-mac
    severity: low
    lines: "1910-2005"
    issue: The systolic energy calculation uses a local 1.0 pJ compute-energy literal and a duplicate local 128 array dimension.
    recommended_change: Use SYSTOLIC_ARRAY_DIM everywhere and either use ENERGY_FLOP_FP16_PJ or add a traceable reference MAC energy if exact 1.0 pJ is pedagogically required.
    mlsysim_target: mlsysim.core.constants.SYSTOLIC_ARRAY_DIM; mlsysim.core.constants.ENERGY_FLOP_FP16_PJ
    render_impact: SYSTOLIC_ARRAY_DIM preserves values; ENERGY_FLOP_FP16_PJ slightly changes systolic pJ from 11.0 to 11.1.
    prose_validation: The "over 100x" and approximate 200x energy advantage claims remain directionally true.
  - id: hwaccel-accelerator-economics-local-prices
    severity: medium
    lines: "2392-2521"
    issue: H100 lower-bound price, TPUv4 estimated price, and Gaudi 2 price are local literals while other accelerator prices come from MLSysIM.
    recommended_change: Add traceable unit-cost/range constants or hardware metadata for H100 low/high, TPUv4 estimated cost, and Gaudi 2 cost.
    mlsysim_target: "mlsysim.core.constants.H100_UNIT_COST_LOW, TPUV4_UNIT_COST_EST, GAUDI2_UNIT_COST"
    render_impact: Preserves rendered values if the new constants match the current assumptions; using H100_UNIT_COST alone changes price/performance.
    prose_validation: The existing caveat that prices are approximate remains necessary and true.
  - id: hwaccel-memory-wall-figure-source-data
    severity: high
    lines: "3005-3183"
    issue: The memory-wall figure hardcodes hardware bandwidths, release years, and model parameter counts, including values that differ from existing MLSysIM hardware constants.
    recommended_change: Build the plotted series from Hardware/Models registries where available and add missing traceable constants or a documented historical dataset for K80, TPUv2, MI325X, VGG-16, ResNet-50, PaLM, DeepSeek-V3, and Llama 4 Maverick.
    mlsysim_target: mlsysim.Hardware; mlsysim.Models; mlsysim.core.constants
    render_impact: Unknown; A100, H100, and TPUv6 points may shift if registry values replace rounded local literals.
    prose_validation: Prose remains true at the trend level, but exact "16x bandwidth growth" should be rechecked after replacement.
  - id: hwaccel-register-energy-per-bit
    severity: low
    lines: "2903-2982"
    issue: The tensor-lifecycle callout hardcodes register energy as a string "0.1" pJ/bit, but MLSysIM only exposes ENERGY_REG_PJ with different units/semantics.
    recommended_change: Add a traceable ENERGY_REGISTER_PJ_PER_BIT constant or revise the prose to use the existing register-access energy constant.
    mlsysim_target: mlsysim.core.constants.ENERGY_REGISTER_PJ_PER_BIT
    render_impact: Preserves the rendered 0.1 value if a matching per-bit constant is added; using ENERGY_REG_PJ would change the prose.
    prose_validation: The hierarchy claim remains true either way, but units need to be explicit.
  - id: hwaccel-a100-pcie-tdp-prose
    severity: low
    lines: "5411-5449"
    issue: The code sources A100 SXM TDP from MLSysIM, but the consuming prose compares it to a local 300 W A100 PCIe TDP literal.
    recommended_change: Add an A100 PCIe hardware variant or A100_PCIE_TDP constant and source the prose from it.
    mlsysim_target: "mlsysim.Hardware.Cloud.A100_PCIe or mlsysim.core.constants.A100_PCIE_TDP"
    render_impact: Preserves the rendered 300 W value if the new constant matches.
    prose_validation: The form-factor distinction remains true and becomes auditable.
  - id: hwaccel-gpt3-training-ops-local
    severity: low
    lines: "5498-5535"
    issue: GPT-3 training FLOPs are hardcoded locally even though MLSysIM exports GPT3_TRAINING_OPS.
    recommended_change: Replace 3.14e23 with GPT3_TRAINING_OPS converted to FLOPs.
    mlsysim_target: mlsysim.core.constants.GPT3_TRAINING_OPS
    render_impact: Preserves all displayed values.
    prose_validation: The Brown et al. training-compute claim remains true.
  - id: hwaccel-fp16-byte-literals
    severity: info
    lines: "3555-3668,4146-4180,5851-5911"
    issue: Several local formulas encode FP16 element size as raw 2s instead of using BYTES_FP16.
    recommended_change: Replace implicit byte literals with BYTES_FP16 in roofline and batch-size formulas.
    mlsysim_target: mlsysim.core.constants.BYTES_FP16
    render_impact: Preserves rendered values.
    prose_validation: The FP16 memory-traffic prose remains true.
  - id: hwaccel-carbon-global-grid-intensity
    severity: low
    lines: "6022-6109"
    issue: The carbon ROI example uses a local 0.4 kg CO2e/kWh global-average carbon intensity.
    recommended_change: Add a traceable global-average carbon-intensity constant or reuse a named regional constant with prose updated to that region.
    mlsysim_target: mlsysim.core.constants.CARBON_GLOBAL_AVG_KGCO2E_KWH
    render_impact: Preserves the 350 metric tons value only if the new constant remains 0.4.
    prose_validation: The qualitative carbon ROI claim remains true; exact savings depend on grid assumption.
