findings:
  - id: vol1-ml-ops-f001
    cell_label: triggered-retraining-anchor-calc
    start_line: 1275
    end_line: 1409
    issue: The fraud retraining daily-decay anchor and associated economics are hard-coded across multiple cells, including a duplicate 2 percent anchor in skew-cost-calc.
    recommended_change: Add a small MLSysIM MLOps fraud-retraining scenario or constants plus a calc_optimal_retraining_interval helper, then have skew-cost-calc, triggered-retraining-anchor-calc, and retraining-interval-calc read from it.
    mlsysim_target: new mlsysim.scenarios.MLOpsFraudRetraining and mlsysim.core.formulas.calc_optimal_retraining_interval
    preserves_rendered_value: true
    prose_validation: The 2 percent daily decay and one-day optimal retraining narrative remain valid if the same scenario values are centralized.
  - id: vol1-ml-ops-f002
    cell_label: null
    start_line: 862
    end_line: 2604
