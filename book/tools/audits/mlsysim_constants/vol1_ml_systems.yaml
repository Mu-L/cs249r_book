findings:
- id: ml-systems-byte-width-literals
  severity: medium
  lines: 711,731,1027-1029,3180,3184
  issue: Several ResNet/KWS model-size calculations hard-code 4, 2, and 1 byte precision
    widths even though MLSysIM exports BYTES_FP32, BYTES_FP16, BYTES_INT8, and PRECISION_MAP.
  recommended_change: Replace local byte-width literals with BYTES_FP32/BYTES_FP16/BYTES_INT8
    or PRECISION_MAP in LighthouseModels, ResnetSetup, and MobileResnetPitfallRecap.
  mlsysim_target: mlsysim.core.constants.BYTES_FP32; BYTES_FP16; BYTES_INT8; PRECISION_MAP
  render_impact: Preserves current rendered model sizes.
  prose_validation: ResNet FP32/FP16/INT8 and KWS FP32 memory prose remains true.
- id: ml-systems-mobile-tdp-range-drift
  severity: medium
  lines: 743,2785,3119,3508
  issue: 'The chapter uses multiple mobile power ranges: LighthouseModels hard-codes
    ''2 to 5'' W while MLSysIM constants use 3-5 W and later prose uses 1-10 W for
    broader comparison.'
  recommended_change: Use MOBILE_TDP_RANGE_W wherever the chapter means the canonical
    mobile thermal envelope; reserve broader 1-10 W language for qualitative comparison
    and label it as such.
  mlsysim_target: mlsysim.core.constants.MOBILE_TDP_RANGE_W; MOBILE_TDP_W
  render_impact: Would change the MobileNet lighthouse sentence from 2 to 5 W to 3
    to 5 W.
  prose_validation: Check that all claims about mobile passive cooling and MobileNet
    deployment still use the same envelope.
- id: ml-systems-latency-reference-local-strings
  severity: medium
  lines: 909-927,3501-3504
  issue: Latency tables hard-code hardware, network, and ML-operation latency strings
    instead of consuming MLSysIM latency constants or a latency reference registry.
  recommended_change: Use existing constants where exact matches exist, and add explicit
    range constants or a small latency-reference registry for NPU, LLM token, network-region,
    KWS, face detection, GPT-4 first-token, and ResNet training-step anchors.
  mlsysim_target: mlsysim.core.constants.LATENCY_* plus proposed MLSysIM latency reference
    constants
  render_impact: Mostly preserves rendered values if the same ranges are centralized;
    direct use of LATENCY_HBM3 would not preserve the current 20-50 ns table row because
    MLSysIM currently defines HBM3 as 300 ns.
  prose_validation: Keep the table framed as order-of-magnitude and resolve the cloud
    latency range difference between 100-500 ms and 100-1000 ms+.
- id: ml-systems-memory-wall-trends-local
  severity: low
  lines: 449-450,491-492
  issue: Compute growth, memory bandwidth growth, and compute doubling period are
    local empirical trend anchors that the prose treats as canonical.
  recommended_change: If these trend numbers recur, add named MLSysIM reference constants
    with provenance; otherwise leave them local but label as approximate historical
    assumptions.
  mlsysim_target: proposed mlsysim.core.constants.COMPUTE_GROWTH_ANNUAL_REF; MEM_BW_GROWTH_ANNUAL_REF;
    COMPUTE_DOUBLING_MONTHS_REF
  render_impact: Preserves the 1.33x memory-wall ratio if the same values are used.
  prose_validation: Approximate wording should remain.
- id: ml-systems-gpt3-training-case-study-local
  severity: medium
  lines: 1511-1513
  issue: The GPT-3 opening example derives PFLOP-days from MLSysIM but hard-codes
    15 days, 10,000 V100s, and $4.6M while MLSysIM already has a different GPT3_TRAINING_DAYS_REF
    for an A100 scenario.
  recommended_change: Add a GPT-3 training case-study object or explicit V100-estimate
    constants rather than mixing local V100 values with registry training ops.
  mlsysim_target: new GPT3_TRAINING_V100_COUNT_REF, GPT3_TRAINING_DAYS_V100_REF, GPT3_TRAINING_COST_USD_REF
    or case-study registry entry
  render_impact: Preserves current cloud-opening values only if the same estimate
    is centralized.
  prose_validation: Do not substitute GPT3_TRAINING_DAYS_REF blindly; it appears to
    describe a different A100 reference.
- id: ml-systems-video-4k-local-duplication
  severity: low
  lines: 2230-2236,2478-2483
  issue: The 4K locality example is duplicated with local 3840x2160 RGB frame constants
    in two cells.
  recommended_change: Add VIDEO_4K_WIDTH and VIDEO_4K_HEIGHT to MLSysIM and reuse
    VIDEO_BYTES_PER_PIXEL_RGB; keep bandwidth/latency as scenario assumptions.
  mlsysim_target: new mlsysim.core.constants.VIDEO_4K_WIDTH; VIDEO_4K_HEIGHT; existing
    VIDEO_BYTES_PER_PIXEL_RGB
  render_impact: Preserves 25 MB frame size and locality conclusion.
  prose_validation: Drone/offload prose remains true.
- id: ml-systems-energy-per-inference-anchors-duplicated
  severity: medium
  lines: 2361,2374,3269-3273,3290-3294
  issue: Full-system energy-per-inference values are duplicated in the figure and
    table and are not sourced from MLSysIM, while ENERGY_MOBILENET_INF_MJ is imported
    but intentionally represents a different lower-level energy value.
  recommended_change: Create MLSysIM full-system inference-energy reference constants
    or a scenario registry for these five tier/workload values, then have both the
    figure and EnergyInference consume that source.
  mlsysim_target: new MLSysIM full-system energy reference constants, distinct from
