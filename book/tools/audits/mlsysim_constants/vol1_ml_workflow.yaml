findings:
- id: vol1_ml_workflow_001
  cell: mobilenet-specs
  line: 800
  issue: MobileNetV2 FP32 model-size calculation hard-codes 4 bytes per parameter.
  recommendation: Replace the local literal with mlsysim.core.constants.BYTES_FP32,
    or derive the size from Models.MobileNetV2 with an explicit precision constant.
  preserves_rendered_value: true
  narrative_check: The rendered value remains about 14 MB, so the mobile workflow
    constraint prose stays valid.
- id: vol1_ml_workflow_002
  cell: constraint-propagation
  line: 912
  issue: Lifecycle stage numbers and the 2^(stage_to-stage_from) cost rule are local
    literals and are repeated later in the chapter.
  recommendation: Add a small MLSysIM workflow helper or lifecycle stage enum for
    constraint-propagation cost, then use it in both constraint-propagation cells.
  preserves_rendered_value: true
  narrative_check: Stage 1 to stage 5 still renders 16x and stage 1 to stage 6 still
    renders 32x; the stage-transition and summary prose remain synchronized.
- id: vol1_ml_workflow_003
  cell: deployment-economics-calc
  line: 1849
  issue: The Jetson edge hardware cost is hard-coded as 500 USD/device while the callout
    names NVIDIA Jetson as the deployment option.
  recommendation: Add a unit_cost field to the relevant MLSysIM edge hardware profile,
    or add a named edge deployment economics profile if the intended SKU is Jetson
    Orin Nano rather than the existing JetsonOrinNX registry entry.
  preserves_rendered_value: unknown
  narrative_check: The payback period depends on this value; centralizing it would
    make any changed rendered value an intentional hardware-profile update.
- id: vol1_ml_workflow_004
  cell: deployment-economics-calc
  line: 1851
  issue: Edge inference cost is a local empirical literal even though it drives the
    deployment payback calculation.
  recommendation: Add an MLSysIM edge-serving economics helper that derives per-image
    cost from edge hardware power, inference latency/energy, and the canonical electricity-price
    baseline, or store this as a named benchmark/economics profile.
  preserves_rendered_value: unknown
  narrative_check: The cloud-vs-edge conclusion is sensitive to this value, so a shared
    helper would make the economic claim reproducible.
- id: vol1_ml_workflow_005
  cell: fallacies-constraint-propagation-anchor
  line: 2128
  issue: The stage-5 constraint-propagation calculation duplicates the earlier local
    lifecycle stage numbers and rule.
  recommendation: Use the same MLSysIM workflow helper proposed for the main ConstraintPropagation
    cell instead of recomputing stage indices locally.
  preserves_rendered_value: true
  narrative_check: The fallacies and summary prose would still render the 16x multiplier
    while avoiding divergence from the earlier callout.
