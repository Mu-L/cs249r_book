findings:
  - id: model-compression-mobilenet-size-duplicates
    severity: medium
    lines: "96-97, 487-570, 656-695, 2081-2117"
    issue: "MobileNetV2 FP32 and INT8 sizes are repeated as local literals even though MLSysIM already has MobileNetV2 parameters and precision byte widths."
    recommended_change: "Derive MobileNetV2 FP32/INT8 sizes from mlsysim.Models.MobileNetV2.size_in_bytes(BYTES_FP32/BYTES_INT8) in CompressionSetup, ModelDeviceComparison, and both pruning anchor cells."
    mlsysim_target: mlsysim.Models.MobileNetV2; mlsysim.core.constants.BYTES_FP32/BYTES_INT8
    render_impact: "Preserves 14 MB, 3.5 MB, and the about-7x TinyML overflow ratio."
    prose_validation: "The MobileNet deployment-gap and pruning prose remains true."
  - id: model-compression-model-device-local-model-sizes
    severity: medium
    lines: "528-535"
    issue: "The deployment table locally hardcodes GPT-2, ResNet-50, MobileNetV2, and DS-CNN footprints while MLSysIM already owns most of the model identities."
    recommended_change: "Use Models.GPT2 and Models.MobileNetV2 size helpers directly; either let ResNet-50 render as the registry-derived about-102 MB value or add an explicit rounded RESNET50_MODEL_SIZE_FP32_MB anchor; add KWS_DSCNN_RUNTIME_FOOTPRINT if the DS-CNN 500 KB value includes runtime footprint rather than weights."
    mlsysim_target: "mlsysim.Models.GPT2, mlsysim.Models.ResNet50, mlsysim.Models.MobileNetV2, mlsysim.Models.Tiny.DS_CNN, optional KWS_DSCNN_RUNTIME_FOOTPRINT"
    render_impact: "GPT-2 and MobileNet values are preserved; ResNet-50 shifts from 100 MB to about 102 MB if derived exactly; DS-CNN impact depends on whether 500 KB is runtime or weight-only."
    prose_validation: "The table's qualitative deployment-gap claim remains true, but exact ResNet/DS-CNN cells need re-render review."
  - id: model-compression-local-byte-bit-literals
    severity: medium
    lines: "2354-2374, 2968-3006, 4336-4393, 5182-5279, 8131-8191"
    issue: "Several cells encode FP32/FP16/INT8 bit or byte widths as raw 4, 2, 8, or 32 literals instead of using existing MLSysIM precision constants."
    recommended_change: "Replace local precision literals with BYTES_FP32, BYTES_FP16, FP32_BITS, and INT8_BITS as appropriate."
    mlsysim_target: mlsysim.core.constants
    render_impact: "Preserves all rendered values."
    prose_validation: "Precision, memory, and speedup prose remains true and becomes auditable."
  - id: model-compression-llama3-8b-local-params
    severity: low
    lines: "3373-3422"
    issue: "The Llama 3 quantization savings callout locally hardcodes 8B parameters although MLSysIM has Llama3_8B."
    recommended_change: "Use mlsysim.Models.Language.Llama3_8B.parameters or LLAMA3_8B_PARAMS and keep precision widths from BYTES_FP16/BYTES_INT4."
    mlsysim_target: mlsysim.Models.Language.Llama3_8B
    render_impact: "Current formatting still renders 8B, 16 GB FP16, 4 GB INT4, and 4x compression."
    prose_validation: "The Llama 3 deployment claim remains true."
  - id: model-compression-system-memory-bandwidth-local
    severity: low
    lines: "328-404"
    issue: "The bandwidth-bound quantization example hardcodes 50 GB/s even though MLSysIM exports SYSTEM_MEMORY_BW with the same value."
    recommended_change: "Import SYSTEM_MEMORY_BW and convert to GB/second for mem_bw_gbs."
    mlsysim_target: mlsysim.core.constants.SYSTEM_MEMORY_BW
    render_impact: "Preserves the 50 GB/s bandwidth and derived latencies."
    prose_validation: "The bandwidth-bound speedup prose remains true."
  - id: model-compression-resnet-fusion-example-missing-source
    severity: medium
    lines: "5182-5390"
    issue: "FusionCalc presents ResNet-50 layer geometry, weights, batch-norm parameters, and kernel counts as local literals; some are architecture anchors and some are benchmark assumptions."
    recommended_change: "At minimum, source byte width from BYTES_FP32 and have ConvFusionCalc reuse FusionCalc variables. If the 256-channel, 28x28 layer and 2.4 MB/0.002 MB per-layer values are reused, add documented ResNet-50 fusion example metadata or a formula helper instead of duplicating literals."
    mlsysim_target: "mlsysim.core.constants.BYTES_FP32; optional ResNet-50 fusion example metadata/formula"
    render_impact: "Preserves rendered traffic, bandwidth-reduction, and V100 timing values if exact example metadata is added."
    prose_validation: "Fusion prose remains true; a central source clarifies which ResNet-50 layer is being modeled."
  - id: model-compression-a100-bandwidth-speedup-derived
    severity: low
    lines: "3630-3675"
    issue: "The FP16-to-INT8 bandwidth-bound speedup is hardcoded as 2 rather than derived from byte widths."
    recommended_change: "Compute bandwidth_bound_speedup as BYTES_FP16 / BYTES_INT8."
    mlsysim_target: mlsysim.core.constants.BYTES_FP16 and BYTES_INT8
    render_impact: "Preserves the rendered 2x value."
    prose_validation: "The bottleneck-dependent speedup explanation remains true."
  - id: model-compression-bert-size-local
    severity: low
    lines: "8131-8205"
    issue: "FallaciesAnalysis hardcodes BERT FP32 and INT8 sizes that are exactly derivable from BERT-Base parameters and byte-width constants."
    recommended_change: "Use mlsysim.Models.Language.BERT_Base.size_in_bytes(BYTES_FP32/BYTES_INT8) for the 440 MB and 110 MB values."
    mlsysim_target: mlsysim.Models.Language.BERT_Base
    render_impact: "Preserves rendered BERT size values."
    prose_validation: "The pitfall about size reduction versus deployment latency remains true."
