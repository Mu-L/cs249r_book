findings:
- id: resnet-serving-benchmark-profile
  severity: medium
  lines: 737-4430
  issue: ResNet-50/V100 serving timings and throughput values are repeated as local
    literals across static batching, lifecycle, batching, runtime, precision, capacity,
    and cost cells.
  recommended_change: Add a clean MLSysIM benchmark/profile object for representative
    ResNet-50 serving on V100/TensorRT, or a chapter-local generated table imported
    by all cells; keep external pricing separate.
  mlsysim_target: mlsysim.models or a new mlsysim.benchmarks/serving profile
  render_impact: Can preserve rendered values if initialized with current numbers.
  prose_validation: Current prose is mostly true as representative benchmark narrative,
    but repeated literals risk divergence.
- id: v100-ridge-point-local-literal
  severity: high
  lines: 1912-1968
  issue: V100 ridge point is a local literal of 16 FLOP/byte while MLSysIM Hardware.V100
    currently represents the SXM-style 15.7 TFLOP/s FP32 and 900 GB/s bandwidth, yielding
    about 17.4 FLOP/byte.
  recommended_change: Either derive the ridge point from Hardware.V100 and adjust
    prose/rendered value, or add an explicit V100 PCIe hardware variant/source constant
    if the chapter intends the 14 TFLOP/s PCIe claim.
  mlsysim_target: Hardware.V100.ridge_point() or new Hardware.Cloud.V100_PCIe
  render_impact: Using current MLSysIM changes 16 to about 17; preserving 16 requires
    a PCIe variant.
  prose_validation: The prose currently mixes PCIe wording with MLSysIM's existing
    V100 constant set.
- id: queueing-p99-factor-repeated
  severity: medium
  lines: 124-190,2355-2426,4806-4943
  issue: The M/M/1 p99 factor 4.6 is repeated as local magic literals instead of deriving
    from -ln(0.01) or a shared queueing helper.
  recommended_change: Add/use a formula helper for M/M/1 percentile latency or a named
    M_M_1_P99_FACTOR derived constant.
  mlsysim_target: mlsysim.physics.calc_queue_latency_mmc or new calc_mm1_percentile_factor(p)
  render_impact: No rendered change expected because -ln(0.01) rounds to 4.6.
  prose_validation: The narrative remains true and becomes easier to audit.
- id: standard-resnet-resolution-local
  severity: low
  lines: 1875-1908
  issue: The standard 224-pixel ResNet input dimension is hard-coded despite existing
    MLSysIM IMAGE_DIM_RESNET.
  recommended_change: Import IMAGE_DIM_RESNET and derive the doubled resolution.
  mlsysim_target: mlsysim.core.constants.IMAGE_DIM_RESNET
  render_impact: No rendered change expected.
  prose_validation: Preserves the resolution-scaling explanation.
- id: bit-width-local-duplicates
  severity: low
  lines: 2355-2426
  issue: FP32 and INT8 bit widths are local literals even though MLSysIM defines FP32_BITS
    and INT8_BITS.
  recommended_change: Import FP32_BITS and INT8_BITS from MLSysIM.
  mlsysim_target: mlsysim.core.constants.FP32_BITS, mlsysim.core.constants.INT8_BITS
  render_impact: No rendered change expected.
  prose_validation: Precision-ratio narrative remains true.
- id: kv-cache-figure-should-use-model-registry
  severity: medium
  lines: 4476-4554
  issue: The KV-cache growth figure hard-codes 70B-class architecture constants that
    already exist in MLSysIM's Llama 3 70B model registry.
  recommended_change: Use Models.Llama3_70B layers, hidden_dim, heads, kv_heads and
    calc_kv_cache_size/get_kv_cache_size; use Hardware.A100/H100 memory capacity for
    the limit line.
  mlsysim_target: mlsysim.Models.Llama3_70B, mlsysim.physics.calc_kv_cache_size,
    mlsysim.Hardware.H100
  render_impact: Should preserve rendered values because local literals match the
    registry dimensions.
  prose_validation: Prose remains true and the figure becomes traceable.
- id: llama3-8b-kv-case-study-mismatch
  severity: high
  lines: 4630-4724
  issue: The 8B Llama case study hard-codes model weight, KV cache capacity, and KV-per-token
    values instead of deriving from MLSysIM; the 0.125 MB/token KV value appears inconsistent
    with MLSysIM Llama3_8B GQA dimensions.
  recommended_change: Derive model footprint from Models.Llama3_8B and precision,
    derive KV/token via get_kv_cache_size(seq_len=1,batch_size=1), and derive remaining
    KV capacity from Hardware.H100.memory_capacity minus weights and reserved overhead.
    If AWQ packing or runtime overhead is intended, add explicit single-source constants
    for those assumptions.
  mlsysim_target: mlsysim.Models.Llama3_8B, mlsysim.Hardware.H100, mlsysim.physics.calc_kv_cache_size,
    PRECISION_MAP/BYTES_INT4
  render_impact: Rendered values likely change unless an explicit AWQ/effective-KV
    profile is added to preserve current numbers.
  prose_validation: The current prose's standard-MHA comparison and GQA reduction
    should be rechecked after derivation.
- id: batching-formulas-local
  severity: medium
  lines: 2990-3615
  issue: Batching wait, service-time, Poisson p99 batch, and adaptive-window formulas
    are locally implemented across multiple cells.
  recommended_change: Move reusable batching formulas into MLSysIM formulas/ServingCapacityModel
    helpers and call them from cells.
  mlsysim_target: mlsysim.physics or mlsysim.core.solver.BatchingOptimizer/ServingCapacityModel
  render_impact: No rendered change expected if helpers encode current formulas.
  prose_validation: Prose remains true; source of formula semantics becomes auditable.
- id: precision-memory-derive-from-model
  severity: low
  lines: 4131-4194
  issue: ResNet-50 FP32/FP16/INT8 memory values are local literals even though MLSysIM
    can compute them from Models.ResNet50 and precision byte constants.
  recommended_change: Use Models.ResNet50.size_in_bytes(BYTES_FP32/BYTES_FP16/BYTES_INT8).
  mlsysim_target: mlsysim.Models.ResNet50, mlsysim.core.constants.BYTES_FP32/BYTES_FP16/BYTES_INT8
  render_impact: No rendered change expected with current model params.
  prose_validation: Precision memory table remains true.
