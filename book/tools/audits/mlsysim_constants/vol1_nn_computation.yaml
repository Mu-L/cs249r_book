findings:
- id: nn-computation-mnist-topology-duplication
  severity: medium
  lines: 84-87,2246-2249,3419-3423,3670-3673,3972-3974,4120-4126,5174-5180,6036-6037,6076-6079
  issue: The chapter defines a canonical MNIST MLP, but many later cells re-hardcode
    784, 128, 64, and 10 instead of using the chapter source or MLSysIM dataset constants.
  recommended_change: Derive input width from MNIST_IMAGE_WIDTH and MNIST_IMAGE_HEIGHT,
    add or use a single MNIST_NUM_CLASSES constant, and have recap cells consume MnistArchitectureConstants.
  mlsysim_target: mlsysim.core.constants.MNIST_IMAGE_WIDTH; MNIST_IMAGE_HEIGHT; new
    MNIST_NUM_CLASSES; chapter MnistArchitectureConstants
  render_impact: Preserves rendered values if constants remain 28, 28, and 10.
  prose_validation: Confirm all references to 784->128->64->10, 109,184 MACs, and
    109,386 parameters still match after substitution.
- id: nn-computation-fp32-byte-literals
  severity: medium
  lines: 547-548,3282-3285,3511-3518,3746-3754,4156-4162,4525-4528,4593-4599,5178-5196,5911-5933
  issue: Several memory calculations use local literal 4 for FP32 bytes even when
    BYTES_FP32 exists in MLSysIM.
  recommended_change: Replace local byte-width literals with BYTES_FP32 or values
    derived from PRECISION_MAP, and use BYTES_ADAM_STATE for two FP32 Adam state tensors
    where appropriate.
  mlsysim_target: mlsysim.core.constants.BYTES_FP32; BYTES_ADAM_STATE; PRECISION_MAP
  render_impact: Preserves all rendered memory values when FP32 remains 4 bytes.
  prose_validation: Recheck all KB/GB values and training/inference ratios after replacing
    literals.
- id: nn-computation-imagenet-layout-constants
  severity: low
  lines: 164-182
  issue: The ImageNet tensor-layout example hardcodes 224, 3, and 1 byte per channel
    even though MLSysIM already has image-size, RGB-channel, and byte-width constants.
  recommended_change: Use IMAGE_DIM_RESNET, IMAGE_CHANNELS_RGB, and BYTES_INT8 or
    an explicit one-byte pixel constant.
  mlsysim_target: mlsysim.core.constants.IMAGE_DIM_RESNET; IMAGE_CHANNELS_RGB; BYTES_INT8
  render_impact: Preserves 224x224x3, 151 KB tensor size, and 301 KB read-plus-write
    traffic.
  prose_validation: Confirm the prose still describes an 8-bit ImageNet RGB tensor.
- id: nn-computation-mnist-training-size
  severity: low
  lines: 542,3283,4718-4726
  issue: The MNIST training-set size 60,000 appears as a local literal and as a derived
    chapter value, but it is a dataset source-of-truth value missing from MLSysIM
    constants.
  recommended_change: Add MNIST_TRAINING_EXAMPLES to MLSysIM and consume it in paradigm,
    memory, and epoch cells.
  mlsysim_target: new mlsysim.core.constants.MNIST_TRAINING_EXAMPLES
  render_impact: Preserves 60,000 examples and 1,875 batches at batch size 32.
  prose_validation: Check all epoch and training-example prose remains consistent.
- id: nn-computation-time-conversion-literal
  severity: low
  lines: 1794-1806
  issue: TrainingEnergyScale uses a local 24 hours/day literal despite MLSysIM exporting
    HOURS_PER_DAY.
  recommended_change: Replace hours_per_day with HOURS_PER_DAY.
  mlsysim_target: mlsysim.core.constants.HOURS_PER_DAY
  render_impact: Preserves LeNet and GPT-4 energy values.
  prose_validation: No prose change expected.
- id: nn-computation-activation-transistor-estimates
  severity: low
  lines: 2566-2583
  issue: The ReLU and sigmoid transistor-count estimates are empirical local literals
    without a MLSysIM or citation-backed source.
  recommended_change: If these are intended as canonical book anchors, add named estimate
    constants with provenance; otherwise label them explicitly as illustrative model
    assumptions.
  mlsysim_target: new mlsysim.core.constants.ACTIVATION_RELU_TRANSISTOR_EST; ACTIVATION_EXP_UNIT_TRANSISTOR_EST
  render_impact: Preserves the 50x ratio only if the same estimates are centralized.
  prose_validation: If cited estimates differ, update the 'approximately 50' and 'over
    2,500' prose.
- id: nn-computation-a100-capacity-unit
  severity: low
  lines: 4891-4913
  issue: A100_MEM_CAPACITY is stored as 80 GiB, but the cell converts it to decimal
    GB, which would render about 86 if a100_mem_gb_str were consumed.
  recommended_change: Convert capacity with GiB for branded 80-style display, or explicitly
    use a branded label separate from physical byte calculations.
  mlsysim_target: mlsysim.core.constants.A100_MEM_CAPACITY with GiB display; or Hardware.A100.memory.capacity
  render_impact: Would change a rendered decimal-GB value from about 86 to 80 GiB/branded
    GB if the export is used.
  prose_validation: If this output becomes visible, ensure the table or footnote says
    GiB or uses the branded 80 GB wording intentionally.
- id: nn-computation-usps-lenet-case-study-literals
  severity: medium
  lines: 5710-5769
  issue: The USPS/LeNet case-study table relies on local empirical and illustrative
    literals for parameters, hardware cost, latency, power, training time, energy,
    and cost per inference.
  recommended_change: Move canonical case-study values into MLSysIM constants or a
    scenario/case-study registry object, and re-export derived ratios from that source.
  mlsysim_target: new MLSysIM USPS/LeNet case-study constants or registry entry
  render_impact: Preserves current ratios only if the same assumptions are centralized;
    authoritative values may change the then-vs-now narrative.
  prose_validation: Validate the 1,000x cost/latency, 20,000x energy, and 8,640x training-time
    ratios against the chosen source.
