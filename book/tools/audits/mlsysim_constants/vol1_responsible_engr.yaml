findings:
- id: edge-deployment-envelope-profiles-local
  severity: medium
  lines: 1495-1586
  issue: The edge deployment constraint table hard-codes representative power and
    latency envelopes for IoT sensors, embedded cameras, and wearables, while only
    the smartphone budget is partially sourced from MLSysIM hardware.
  recommended_change: Add edge deployment envelope/profile definitions to MLSysIM,
    or extend Systems.Tiers/Hardware profiles with representative power and latency
    budgets for these archetypes.
  mlsysim_target: new MLSysIM edge deployment profile registry or mlsysim.Systems.Tiers
    edge profiles
  render_impact: No rendered change expected if the profiles are initialized to 100
    mW/1 s, 1 W/33 ms, and 500 mW/500 ms.
  prose_validation: The table caption and prose remain narratively valid because they
    already present these as representative constraints.
- id: efficientnet-b0-missing-model-registry
  severity: low
  lines: 1495-1586
  issue: EfficientNet-B0's 5.3M parameter count is a model architecture constant but
    is local because the cell notes it is not in the Twin yet.
  recommended_change: Add an EfficientNet-B0 entry to the MLSysIM model registry and
    read parameters from that entry.
  mlsysim_target: new mlsysim.Models.Vision.EfficientNetB0
  render_impact: No rendered change if initialized with 5.3M parameters.
  prose_validation: The model efficiency comparison remains true and becomes traceable.
- id: edge-model-efficiency-benchmarks-local
  severity: medium
  lines: 1495-1586
  issue: Representative inference power and latency values for MobileNetV2, EfficientNet-B0,
    ResNet-50, and the TinyML model are hard-coded as empirical benchmark-like values.
  recommended_change: Introduce MLSysIM edge inference benchmark/profile objects keyed
    by model and deployment class, keeping scenario deployment budgets separate.
  mlsysim_target: new MLSysIM benchmark/profile layer for edge inference power and
    latency
  render_impact: Can preserve rendered table values if the benchmark profiles use
    the current representative numbers.
  prose_validation: The fit/no-fit narrative stays valid; centralization prevents
    future drift between model profiles and deployment guidance.
- id: tco-lifecycle-helper-local-formulas
  severity: medium
  lines: 1620-2044
  issue: The chapter locally implements recommendation-system lifecycle TCO and carbon
    arithmetic across inference-cost, TCO, and summary cells, duplicating formulas
    for GPU-hours, annual cost, three-year lifecycle cost, and carbon savings.
  recommended_change: Add a reusable MLSysIM TCO/lifecycle ledger helper that accepts
    local scenario assumptions plus sourced GPU price/carbon constants, then returns
    training, inference, operations, and carbon totals.
  mlsysim_target: new MLSysIM TCO/lifecycle helper, likely under mlsysim.physics
    or a cost/accounting module
  render_impact: No rendered change expected if helper calculations match the current
    formulas.
  prose_validation: The inference-dominance narrative remains true; helper output
    makes the repeated lifecycle ratios auditable.
- id: mass-energy-conversion-literals
  severity: low
  lines: 1722-2129
  issue: Carbon accounting cells use local 1000-scale conversions for W-to-kW, MWh-to-kWh,
    and kg-to-metric-ton despite MLSysIM already relying on pint units and shared
    scalars elsewhere.
  recommended_change: Use MLSysIM unit conversions directly, especially kilowatt and
    mass units, or add named helpers such as KG_PER_METRIC_TON for formatted carbon
    outputs.
  mlsysim_target: mlsysim.core.constants.kilowatt and mass-unit helpers or KG_PER_METRIC_TON
  render_impact: No rendered change expected.
  prose_validation: Carbon intensity, emissions, and car-equivalent prose remain valid.
- id: loan-fairness-recap-duplicates-counts
  severity: low
  lines: 709-781,2703-2743
  issue: The fallacies/pitfalls recap repeats the loan worked example's TP/FN counts
    locally to recompute the TPR gap and FNR ratio.
  recommended_change: Reuse LoanFairness outputs or factor the loan example into a
    single chapter-local class/helper; this does not need an MLSysIM system constant.
  mlsysim_target: null
  render_impact: No rendered change expected.
  prose_validation: The 30 percentage-point gap and 4x false-negative ratio remain
    aligned with the worked example.
