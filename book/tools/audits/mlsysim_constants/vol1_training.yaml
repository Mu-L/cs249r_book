findings:
  - id: training-gpt2-local-model-architecture
    severity: medium
    lines: "96-104,435-446,1341-1352"
    issue: Several GPT-2 architectural constants are still local literals, especially 48 layers and 25 heads, even though MLSysIM already exposes GPT2_LAYERS, GPT2_HEADS, and Models.GPT2.
    recommended_change: Replace local GPT-2 layer/head literals with Models.GPT2 attributes or mlsysim.core.constants.GPT2_* constants.
    mlsysim_target: mlsysim.Models.GPT2 and mlsysim.core.constants.GPT2_HEADS
    render_impact: Should preserve rendered values; head_dim remains 64 and checkpoint examples remain 48-layer GPT-2.
    prose_validation: Prose explicitly names GPT-2, so a registry-backed value is more accurate and remains true.
  - id: training-gpt2-small-missing-registry
    severity: low
    lines: "1684-1698"
    issue: GPT-2 Small dimensions are local literals, but the prose treats them as model facts.
    recommended_change: Add a GPT2Small model registry entry or constants for GPT2_SMALL_HIDDEN_DIM and GPT2_SMALL_HEADS if this example is retained.
    mlsysim_target: mlsysim.Models.GPT2Small or mlsysim.core.constants.GPT2_SMALL_*
    render_impact: Should preserve the rendered 768 hidden size, 12 heads, 64 head dimension, and 32 FLOP/byte intensity.
    prose_validation: The attention-intensity statement remains true if the source-of-truth values match standard GPT-2 Small.
  - id: training-network-100g-local-bandwidth
    severity: medium
    lines: "2580-2604"
    issue: The 100 Gbps network bandwidth is encoded locally as 12.5 GB/s even though MLSysIM has NETWORK_100G_BW and a 100GbE system fabric.
    recommended_change: Use NETWORK_100G_BW.m_as(GB/second) or Systems.NetworkFabrics.Ethernet_100G.bandwidth.
    mlsysim_target: mlsysim.core.constants.NETWORK_100G_BW
    render_impact: Preserves 12.5 GB/s and the 2.0 s AllReduce result.
    prose_validation: Prose says 100 Gbps InfiniBand/100 Gbps network; the source change preserves the claim.
  - id: training-hardware-local-v100-capacity
    severity: low
    lines: "4337-4338"
    issue: GPT-2 mixed-precision callout hard-codes V100 capacity as 32 instead of using MLSysIM V100 memory capacity.
    recommended_change: Replace with V100_MEM_CAPACITY.m_as(GB) or Hardware.Cloud.V100.memory_capacity.m_as(GB).
    mlsysim_target: mlsysim.core.constants.V100_MEM_CAPACITY
    render_impact: Preserves the visible 32 GB capacity.
    prose_validation: The statement that checkpointed GPT-2 fits in a 32 GB V100 remains true under existing constants.
  - id: training-llama2-and-h100-cost-local
    severity: medium
    lines: "3302-3316"
    issue: The utility-bill example names Llama 2 70B and H100 purchase price but uses local literals for both.
    recommended_change: Use Models.Llama2_70B.parameters and H100_UNIT_COST; keep token count, utilization, GPU count, and rental rate as scenario assumptions.
    mlsysim_target: mlsysim.Models.Llama2_70B; mlsysim.core.constants.H100_UNIT_COST
    render_impact: Should preserve 70B parameters and $30,000 purchase price with current MLSysIM values.
    prose_validation: The named-model and purchase-cost claims remain true and become auditable.
  - id: training-resnet-architecture-metadata-missing
    severity: low
    lines: "2718-2728,2984-2998,3031-3041"
    issue: ResNet-50 input/conv/layer/filter dimensions are local literals while prose treats them as ResNet-50 architecture facts.
    recommended_change: Add optional architecture-shape metadata to Models.ResNet50 or keep these explicitly documented as scenario dimensions.
    mlsysim_target: mlsysim.Models.ResNet50 architecture metadata
    render_impact: Preserves rendered values if standard ResNet-50 conv1 metadata is added.
    prose_validation: Current prose remains plausible, but source-of-truth metadata would prevent drift from model registry params/FLOPs.
  - id: training-warp-size-local-hardware-constant
    severity: low
    lines: "2735-2755"
    issue: NVIDIA warp size is a true hardware architecture constant but is local as wave_warp = 32.
    recommended_change: Add CUDA_WARP_SIZE = 32 to MLSysIM constants or expose it on NVIDIA hardware architecture metadata.
    mlsysim_target: mlsysim.core.constants.CUDA_WARP_SIZE
    render_impact: Preserves all wave quantization rendered values.
    prose_validation: The prose about 32x32 alignment and warp-boundary effects remains true.
  - id: training-byte-width-local-literals
    severity: low
    lines: "2486-2489,2904-2905,6635-6637"
    issue: Several byte-width calculations use local numeric literals for int64 token IDs, FP16 activation bytes, and Adam state bytes even though MLSysIM already centralizes most precision widths.
    recommended_change: Use BYTES_FP16 and BYTES_ADAM_STATE where available; add BYTES_INT64 if token-id tensor size is reused.
    mlsysim_target: mlsysim.core.constants.BYTES_FP16; mlsysim.core.constants.BYTES_ADAM_STATE; proposed BYTES_INT64
    render_impact: Preserves rendered memory values.
    prose_validation: The prose remains true because these are unit conversions, not scenario changes.
  - id: training-host-power-assumption
    severity: info
    lines: "5502-5519,6489-6515"
    issue: Host CPU power is locally assumed as 200 W in energy calculations.
    recommended_change: Keep local if scenario-specific; if reused across chapters, add a HOST_CPU_TDP_W or node-level power default in MLSysIM systems/infra.
    mlsysim_target: mlsysim.systems.Node or proposed mlsysim.core.constants.HOST_CPU_TDP_W
    render_impact: Preserves rendered energy and carbon values if default is 200 W.
    prose_validation: Prose frames the values as estimates and remains true.
