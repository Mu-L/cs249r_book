findings:
- id: aa-001-quick-calc-cluster-sizes-local
  severity: medium
  lines: 60-61
  issue: FleetQuickCalc hard-codes 8,192 and 100,000 GPU examples even though these
    are canonical cluster sizes exposed by MLSysIM and later by the appendix tables.
  recommended_change: Import and use CLUSTER_LARGE_GPUS and CLUSTER_MEGA_GPUS, or
    derive the values from Systems.Clusters.Frontier_8K.total_accelerators and Systems.Clusters.Mega_100K.total_accelerators.
  mlsysim_target: mlsysim.core.constants.CLUSTER_LARGE_GPUS / CLUSTER_MEGA_GPUS or
    mlsysim.Systems.Clusters
  render_impact: Should preserve the 8,192-GPU and 100,000-GPU rendered values and
    failure-rate outputs.
  prose_validation: The quick-calculation narrative remains valid; it becomes more
    directly traceable to the cluster-reference table.
- id: aa-002-allreduce-factor-local
  severity: medium
  lines: 84,126,542-545
  issue: The quick AllReduce example uses a local literal 2 even though ALLREDUCE_FACTOR
    is already a named MLSysIM communication-model constant documented later in the
    appendix.
  recommended_change: Import ALLREDUCE_FACTOR and compute allreduce_s from ALLREDUCE_FACTOR
    * grad_gb / ib_bw_gbs.
  mlsysim_target: mlsysim.core.constants.ALLREDUCE_FACTOR
  render_impact: Should preserve the displayed 2x factor and AllReduce time.
  prose_validation: The AllReduce prose and allreduce-parameter table remain narratively
    aligned.
- id: aa-003-hours-per-month-local
  severity: low
  lines: 70,88-89,128
  issue: The monthly carbon example hard-codes 720 h/month instead of deriving it
    from MLSysIM time conversion scalars.
  recommended_change: Compute hours_per_month as DAYS_PER_MONTH * HOURS_PER_DAY.
  mlsysim_target: mlsysim.core.constants.DAYS_PER_MONTH and mlsysim.core.constants.HOURS_PER_DAY
  render_impact: Should preserve 720 h/month and the Quebec/Poland CO2 values.
  prose_validation: The monthly carbon-footprint paragraph remains valid because MLSysIM's
    DAYS_PER_MONTH is currently 30.
- id: aa-004-h100-capacity-display-literal
  severity: low
  lines: 191-194,416-422
  issue: The H100 recap table hard-codes the branded 80 GB capacity label as MarkdownStr("80")
    instead of tracing the value to H100_MEM_CAPACITY.
  recommended_change: Use H100_MEM_CAPACITY with a small branded-capacity formatting
    helper that preserves the visible 80 GB label while keeping calculations tied
    to the GiB-backed constant.
  mlsysim_target: mlsysim.core.constants.H100_MEM_CAPACITY plus a display helper for
    branded GPU memory labels
  render_impact: Should preserve the visible 80 GB table value.
  prose_validation: The foundational H100 recap remains correct under the existing
    branded-memory-label convention.
- id: aa-005-node-reliability-composition-local
  severity: medium
  lines: 342-349,489-501
  issue: The node MTTF caption derives a DGX-style node reliability model locally,
    mixing MLSysIM MTTF constants with literal component counts for PSUs and PCIe
    switches and duplicating reliability formula logic.
  recommended_change: Use Systems.Nodes.DGX_H100 for accelerators, NICs, and PSUs,
    and add or use an MLSysIM node-reliability helper that can include PCIe switch
    and HBM-stack terms.
  mlsysim_target: mlsysim.Systems.Nodes.DGX_H100 and an extended mlsysim.core.formulas.calc_mtbf_node
    or DGX_H100 reliability profile
  render_impact: Should preserve the node MTTF hours/days if the helper uses the same
    8 GPU, 8 NIC, 2 PSU, 1 PCIe switch, and 8 HBM-stack composition.
  prose_validation: The component-MTTF narrative remains valid; rerender to confirm
    the combined node MTTF caption after helper adoption.
- id: aa-006-egress-seconds-per-day-local
  severity: low
  lines: 379,619
  issue: The economic egress example hard-codes 86,400 seconds/day while the MLSysIM
    unit layer already exposes SEC_PER_DAY.
  recommended_change: Replace 86_400 with SEC_PER_DAY in the egress_day_cost calculation.
  mlsysim_target: mlsysim.core.constants.SEC_PER_DAY
  render_impact: Should preserve the displayed egress USD/day value.
  prose_validation: The serving-egress example remains a local 1 KB/query at 10,000
    QPS scenario; only the time conversion changes source.
notes:
- All 2 Python cells in the assigned chapter are included.
- The assigned source QMD was read only; this audit writes only the assigned YAML
  file.
- Local scenario assumptions such as the 5,000 km WAN example, 10 MW WUE example,
  10,000-GPU carbon/PUE examples, and 1 KB at 10,000 QPS egress example were left
  local unless the literal was a reusable MLSysIM unit conversion or duplicated an
  existing MLSysIM constant.
