findings:
- id: appendix-c3-001-diagnostic-thresholds-single-source
  severity: medium
  lines: 215-282,392-398,463-465,477-481,579-581
  issue: 'Several C3 diagnostic thresholds are hard-coded in prose tables and exercise
    text even though they define the appendix''s reusable traffic-light rubric: GPU
    utilization below 80 percent, communication warning/red bands at 20/40 percent,
    communication greater than 30 percent of step in the summary table, goodput warning/red
    bands at 75/90 percent, and the f_compute 0.5 split.'
  recommended_change: Add a small MLSysIM C3/diagnostics threshold group or helper
    that exposes the communication-fraction bands, goodput bands, utilization symptom
    threshold, and compute-fraction split; render the prose tables from those values
    as the MFU and scaling-efficiency rows already do.
  mlsysim_target: new mlsysim.core.constants C3_COMM_FRACTION_GREEN/YELLOW/RED, C3_GOODPUT_GREEN/YELLOW/RED,
    C3_GPU_UTIL_LOW, and C3_COMPUTE_FRACTION_SPLIT, or an equivalent diagnostics object
  render_impact: Should preserve the rendered 20/40 percent communication bands, 75/90
    percent goodput bands, 80 percent utilization symptom, 30 percent communication
    symptom, and 0.5 compute-fraction rule.
  prose_validation: The appendix remains narratively valid; centralizing the bands
    makes the C3 traffic light and scorecard a reusable MLSysIM reference instead
    of prose-only policy.
- id: appendix-c3-002-scheduler-overhead-constant
  severity: medium
  lines: 76-95,169-174,346-357,447-451
  issue: Scheduler preemption overhead is mixed into the same goodput decomposition
    as MLSysIM overhead constants, but the scheduler term is a local 17 percent literal.
  recommended_change: Add a scheduler/preemption overhead constant to the MLSysIM
    overhead budget and derive C3.goodput_all and case3_oh_scheduler_pct_str from
    it.
  mlsysim_target: new mlsysim.core.constants.OVERHEAD_SCHEDULER or OVERHEAD_SCHEDULER_PREEMPTION
  render_impact: No rendered change expected if initialized to 0.17; Case 3 still
    shows 17 percent scheduler preemptions and the callout still renders roughly 62
    percent goodput.
  prose_validation: The coordination-tax narrative remains valid and becomes consistent
    with the existing pipeline, checkpoint, failure, and maintenance overhead constants.
- id: appendix-c3-003-mega-cluster-reference
  severity: low
  lines: 87-99,445-451,463-465
  issue: The effective-FLOP/s callout hard-codes 100,000 GPUs even though MLSysIM
    exposes CLUSTER_MEGA_GPUS as the Volume II mega-cluster reference.
  recommended_change: Import CLUSTER_MEGA_GPUS and use it for n_gpus_eff; keep the
    case-study 10,000-GPU and 512-GPU scenarios local.
  mlsysim_target: mlsysim.core.constants.CLUSTER_MEGA_GPUS
  render_impact: No rendered change expected; aggregate H100 peak remains about 98,900
    PFLOP/s and the C3 tax prose still describes a 100,000-GPU cluster.
  prose_validation: The callout title, summary bullet, and effective-FLOP/s narrative
    remain unchanged.
