findings:
  - id: appendix-communication-fp16-gradient-payload-local
    severity: low
    lines: "81-83,153,473"
    issue: "The AllReduce/compression worked examples encode the gradient payload as BILLION bytes even though the adjacent prose defines it as a 500M-parameter FP16 gradient."
    recommended_change: "Compute the payload from the scenario parameter count and MLSysIM precision width, for example 500 * MILLION * BYTES_FP16, or introduce a named reusable example payload helper if this 500M FP16 gradient appears elsewhere."
    mlsysim_target: "mlsysim.core.constants.BYTES_FP16 and MILLION; optional new example payload helper"
    render_impact: "No rendered change expected; the payload should still display as 1 GB and the AllReduce timings should remain unchanged apart from insignificant floating-point formatting."
    prose_validation: "The setup and compression prose remain narratively valid because they already describe the payload as a 500M-parameter FP16 gradient."
  - id: appendix-communication-interleaved-bubble-local-formula
    severity: low
    lines: "85-89,108-109,155-157,447"
    issue: "The standard pipeline bubble values use calc_pipeline_bubble, but the interleaved value reimplements the same formula locally even though the MLSysIM helper already accepts v_stages."
    recommended_change: "Replace the local interleaved expression with calc_pipeline_bubble(p_stages, m_microbatches, v_stages=v_interleave)."
    mlsysim_target: mlsysim.core.formulas.calc_pipeline_bubble
    render_impact: "No rendered change expected; the helper implements (p-1)/(v*m+p-1), matching the local expression."
    prose_validation: "The p=8, m=16, V=4 explanation and the reported bubble reduction remain valid."
  - id: appendix-communication-compression-breakeven-helper
    severity: low
    lines: "90-93,120-128,176-187,490-499"
    issue: "The compression break-even equation is a reusable MLSysIM communication model, but the chapter defines it as a local static method and manually expands the table cells."
    recommended_change: "Add or reuse an MLSysIM helper such as calc_compression_breakeven_overhead(comm_time, compression_ratio), then use it for the worked example and break-even table."
    mlsysim_target: "new mlsysim.core.formulas.calc_compression_breakeven_overhead"
    render_impact: "No rendered change expected if the helper preserves comm_ms * (1 - 1/compression_ratio)."
    prose_validation: "The adjacent prose explicitly states the bandwidth-dominated approximation, so a helper with that documented assumption keeps the narrative accurate."
