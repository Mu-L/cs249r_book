findings:
- id: appendix-dam-transformer-decode-flops-rule
  severity: medium
  lines: 47, 63-65
  issue: The transformer decode/forward rule of thumb, 2 FLOPs per parameter, is encoded
    as a local literal.
  recommended_change: Add or reuse an MLSysIM helper such as calc_transformer_decode_flops(params_or_model)
    so chapters do not repeat the decode FLOP multiplier by hand.
  mlsysim_target: mlsysim.core.formulas.calc_transformer_decode_flops or shared TRANSFORMER_DECODE_FLOPS_PER_PARAM
  render_impact: Preserves derived values if initialized with the current 2 FLOPs/parameter
    rule; the current chapter does not directly render the decode FLOP value.
  prose_validation: The batch-1 latency/utilization diagnostic remains narratively
    valid because only the source of the formula changes.
- id: appendix-dam-diagnostic-thresholds-helper
  severity: medium
  lines: 141-143
  issue: The arithmetic-intensity section repeats diagnostic thresholds for low GPU
    utilization, high GPU utilization, and batch-size-1 latency-bound behavior as
    prose literals.
  recommended_change: Add a small MLSysIM D.A.M diagnostics threshold profile for
    utilization and latency-bound heuristics, then render these cutoffs from that
    shared source.
  mlsysim_target: new mlsysim diagnostics constants/helper such as DAM_GPU_UTIL_DATA_BOUND_PCT,
    DAM_GPU_UTIL_MACHINE_BOUND_PCT, DAM_LATENCY_BOUND_BATCH_SIZE
  render_impact: Can preserve the rendered 80 percent, 95 percent, and batch-size-1
    thresholds if initialized with current values.
  prose_validation: The heuristic bullets remain valid; centralizing them makes the
    diagnostic rubric traceable across appendices.
- id: appendix-dam-scorecard-thresholds-helper
  severity: medium
  lines: 176-180
  issue: The D.A.M scorecard hardcodes I/O overhead and MFU failing/passing thresholds
    in the table.
  recommended_change: Use an MLSysIM diagnostics profile or threshold helper for scorecard
    cutoffs; reuse existing MFU threshold constants if available and add D.A.M-specific
    I/O overhead cutoffs.
  mlsysim_target: mlsysim.core.defaults.MFU_TRAINING_LOW/HIGH plus new DAM_IO_OVERHEAD_FAILING_PCT
    and DAM_IO_OVERHEAD_PASSING_PCT constants
  render_impact: Can preserve the rendered 10 percent, 1 percent, 30 percent, and
    50 percent thresholds if initialized with current values.
  prose_validation: The scorecard remains narratively valid while sharing one source
    of truth for diagnostic grades.
