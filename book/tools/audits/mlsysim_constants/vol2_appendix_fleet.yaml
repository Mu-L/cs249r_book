findings:
  - id: appendix-fleet-node-topology-counts
    severity: medium
    lines: "94-98"
    issue: "Node MTBF calculation hardcodes the DGX-style component counts as 8 GPUs, 8 NICs, and 4 PSUs instead of reading them from MLSysIM node modeling infrastructure."
    recommended_change: "Import/use Systems.Nodes.DGX_H100 for accelerators_per_node, nics_per_node, and psus_per_node, and make the 4-PSU assumption canonical if that is the intended reference node composition."
    mlsysim_target: "mlsysim.Systems.Nodes.DGX_H100; possibly explicit psus_per_node=4 in the registry"
    render_impact: "No visible chapter value currently depends on FF.node_mtbf_h, but preserving the hidden value requires keeping 4 PSUs rather than silently using the registry default of 2."
    prose_validation: "The surrounding prose says real clusters include NIC, PSU, cable, and switch failures; centralizing the counts makes any future node-MTBF prose traceable."
  - id: appendix-fleet-cluster-scales-and-24h-window
    severity: medium
    lines: "100-111, 535-544"
    issue: "The MTBF setup repeats 256, 2048, 8192, and a 24-hour failure window locally even though the cluster sizes and time conversions exist in MLSysIM."
    recommended_change: "Use CLUSTER_SMALL_GPUS, CLUSTER_MEDIUM_GPUS, CLUSTER_LARGE_GPUS, CLUSTER_MEGA_GPUS, and HOURS_PER_DAY or 1 * day for the failure-probability window."
    mlsysim_target: "mlsysim.core.constants.CLUSTER_*_GPUS and mlsysim.core.constants.HOURS_PER_DAY/day"
    render_impact: "Preserves the MTBF table rows and current failure probabilities: about 12 percent, 63 percent, 98 percent, and 100 percent over 24 hours."
    prose_validation: "The caption and line 544 explicitly discuss a 24-hour training window; keep that wording synchronized with the sourced duration."
  - id: appendix-fleet-checkpoint-model-state-constants
    severity: high
    lines: "155-158, 306, 319, 548, 579-586"
    issue: "Checkpoint sizes are driven by local model-scale literals and an explicit 14 bytes/parameter literal, even though MLSysIM already owns byte-width constants and calc_checkpoint_size has a 14-byte default convention."
    recommended_change: "Use model registry constants where exact values preserve the table, especially GPT3_PARAMS for 175B and LLAMA2_70B_PARAMS or a generic 70B scale for 70B. Add generic 7B and 1T model-scale constants if these rows remain reference scales. Source the 14-byte checkpoint convention from calc_checkpoint_size default or a named mixed-precision Adam checkpoint-state helper derived from BYTES_FP16, BYTES_FP32, and BYTES_ADAM_STATE."
    mlsysim_target: "GPT3_PARAMS; LLAMA2_70B_PARAMS or new MODEL_SCALE_70B_PARAMS; new MODEL_SCALE_7B_PARAMS and MODEL_SCALE_1T_PARAMS; proposed BYTES_MIXED_PRECISION_ADAM_CHECKPOINT or calc_checkpoint_size default"
    render_impact: "Must preserve 98 GB, 980 GB, 2,450 GB, and 14 TB at current precision unless the prose and table are intentionally revised."
    prose_validation: "The text repeatedly explains the 14 B/param common Adam checkpoint state; any implementation should update all mentions together if the convention changes."
  - id: appendix-fleet-mfu-scaling-pitfall-literals
    severity: medium
    lines: "184-185, 1017"
    issue: "The MFU pitfall computes expected and actual 1,024-GPU throughput with local literals 1024 and 0.5, while 0.5 is already the MLSysIM MFU_TRAINING_HIGH reference and the 1,024 value is coupled to SCALING_EFF_1024GPU."
    recommended_change: "Replace the 0.5 literal with MFU_TRAINING_HIGH. Consider adding a named 1024-GPU scaling reference or helper that pairs SCALING_EFF_1024GPU with its GPU count."
    mlsysim_target: "mlsysim.core.constants.MFU_TRAINING_HIGH and proposed SCALING_EFF_1024GPU_N or scaling-efficiency profile object"
    render_impact: "Preserves the rendered 512 expected GPU-equivalents and 256 actual GPU-equivalents."
    prose_validation: "The prose says the team achieves 50 percent MFU and scales to 1,024 GPUs; both values should remain synchronized with the calculation."
  - id: appendix-fleet-comm-comp-scenario-profile
    severity: medium
    lines: "823-850, 870-882"
    issue: "The communication-computation ratio cell mixes correctly sourced network and precision constants with local 256-GPU, 7B, 350M, 16 MB, and compute-time scenario literals."
    recommended_change: "At minimum use CLUSTER_SMALL_GPUS or Systems.Clusters.Research_256.total_accelerators for both data-parallel rows and GPUS_PER_HOST for the tensor-parallel node label. If these representative rows are reused across chapters, add a FleetCommComp scenario profile that owns the 7B/350M model scales, 5.0 s/10 ms compute times, 16 MB activation payload, and 1 ms layer time."
    mlsysim_target: "CLUSTER_SMALL_GPUS; GPUS_PER_HOST; proposed FleetCommCompRatioScenarios or representative model-scale constants"
    render_impact: "Preserves current outputs if initialized with the existing values: 560.4 ms and rho 0.11 for 7B, 30.4 ms and rho 3.0 for 350M, and about 0.018 ms and rho 0.018 for tensor parallelism."
    prose_validation: "The table and paragraphs explicitly contrast 7B, 350M, and 8-GPU NVLink scenarios; model-scale substitutions such as BERT-Large 340M would require prose and rendered-value review."
  - id: appendix-fleet-amdahl-rendering-duplication
    severity: low
    lines: "754, 769-770, 778-790, 991-993"
    issue: "The Amdahl example stores s_fleet=0.10 but separately hardcodes MarkdownStr(\"10\") for prose rendering."
    recommended_change: "Derive s_fleet_pct_str from s_fleet with the existing formatter path so the rendered percentage cannot drift from the calculation."
    mlsysim_target: "local derivation from FleetAmdahlExample.s_fleet; no new MLSysIM constant required"
    render_impact: "Preserves the rendered 10 percent and 10x ceiling when s_fleet remains 0.10."
    prose_validation: "Lines 778, 786, 790, and 993 all consume the rendered percentage."
  - id: appendix-fleet-hardware-table-hardcoded-specs
    severity: medium
    lines: "701-709"
    issue: "The hardware reference table still hardcodes some hardware specs outside the Python cell: B200 intra-node link, MI300X Infinity Fabric, TPU v6 ICI, and TPU v6 TDP."
    recommended_change: "Render B200 intra-node link from NVLINK_B200_BW and add traceable MLSysIM constants for MI300X intra-node link, TPUV6_ICI_BW, and TPUV6_TDP if the rows remain in the reference table."
    mlsysim_target: "NVLINK_B200_BW; proposed MI300X_INTRA_NODE_BW, TPUV6_ICI_BW, and TPUV6_TDP"
    render_impact: "Preserves 1,800 GB/s, about 890 GB/s, about 2,000 GB/s, and about 600 W if new constants are initialized to current table values."
    prose_validation: "The caption frames this as a current hardware reference table, so any updates should be made through MLSysIM constants rather than table literals."
