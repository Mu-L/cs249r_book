findings:
- id: cc-001-llama70b-and-precision-literals
  severity: medium
  lines: 96-155,519-602,701-751,2039-2064
  issue: Several cells encode 70B Llama-class parameter counts and 2-byte BF16/FP16
    element widths as raw literals instead of using MLSysIM model and precision constants.
  recommended_change: Derive 70B parameter counts from LLAMA2_70B_PARAMS or Models.Llama2_70B.parameters,
    and derive BF16/FP16 byte width from BYTES_FP16 or PRECISION_MAP.
  mlsysim_target: mlsysim.core.constants.LLAMA2_70B_PARAMS; mlsysim.Models.Llama2_70B;
    mlsysim.core.constants.BYTES_FP16
  render_impact: Should preserve rendered 140 GB gradients and the MoE 4.096 KB/token
    value when using the exact 70B and 2-byte constants.
  prose_validation: Adjacent prose says Llama-class/70B and BF16 or FP16; the narrative
    remains valid with central constants.
- id: cc-002-interconnect-bandwidth-literals
  severity: medium
  lines: 96-155,195-273,343-417,701-751,1016-1095
  issue: NDR 50 GB/s, H100 NVLink 900 GB/s, and HDR-like 200 Gbps bandwidths are repeated
    as local literals in calculations and figure annotations.
  recommended_change: Use INFINIBAND_NDR_BW, NVLINK_H100_BW, and INFINIBAND_HDR_BW,
    formatting to GB/s or Gbps as needed.
  mlsysim_target: mlsysim.core.constants.INFINIBAND_NDR_BW; mlsysim.core.constants.NVLINK_H100_BW;
    mlsysim.core.constants.INFINIBAND_HDR_BW
  render_impact: Should preserve the rendered 50 GB/s, 900 GB/s, and 200 Gbps values.
  prose_validation: The bandwidth hierarchy and NDR/HDR examples remain narratively
    unchanged.
- id: cc-003-interconnect-latency-single-source
  severity: medium
  lines: 96-155,343-417,519-602,701-751,1016-1095,1308-1376
  issue: Communication startup latencies are true interconnect/model parameters but
    appear as local 1 us, 1.5 us, 2 us, and 3 us literals. Existing LATENCY_INFINIBAND
    is 5 us and does not match the chapter's NDR example values.
  recommended_change: Add or expose clean MLSysIM collective-latency references for
    NDR InfiniBand and H100/NVLink examples, with names that distinguish physical
    one-way latency from alpha-beta startup latency.
  mlsysim_target: new mlsysim.core.constants values such as INFINIBAND_NDR_ALPHA_US
    and NVLINK_H100_ALPHA_US, or interconnect registry fields for latency/startup
    overhead
  render_impact: Can preserve all rendered values if initialized to the chapter's
    current 1-3 us assumptions; otherwise affected timings must be rechecked.
  prose_validation: The prose's stated 1-3 us NDR range remains valid, but the central
    source should make clear which representative value each notebook uses.
- id: cc-004-collective-formulas-local
  severity: low
  lines: 96-155,343-417,519-602,701-751,1016-1183,1308-1483
  issue: Ring, Tree, AllToAll, critical-message-size, crossover, and hierarchical
    collective formulas are reimplemented locally across cells even though MLSysIM
    already has several communication formula helpers.
  recommended_change: Use calc_ring_allreduce_time, calc_tree_allreduce_time, calc_all_to_all_time,
    and calc_hierarchical_allreduce_time where semantics match. Add small helpers
    for critical message size, ring/tree crossover, double-tree approximation, and
    multi-tier hierarchical collectives if those are intended reusable teaching formulas.
  mlsysim_target: mlsysim.physics.calc_ring_allreduce_time; calc_tree_allreduce_time;
    calc_all_to_all_time; calc_hierarchical_allreduce_time; proposed calc_critical_message_size
    and calc_ring_tree_crossover_size
  render_impact: Ring/tree formulas should preserve values exactly. Hierarchical and
    per-peer AllToAll replacements need verification because current local arithmetic
    may not match existing helper semantics.
  prose_validation: Formula-centered prose remains valid if helper semantics are aligned
    with the displayed derivations.
- id: cc-005-gpus-per-host-literals
  severity: low
  lines: 519-602,1308-1376,1407-1483
  issue: DGX-style 8 GPUs per node is repeated as a local hardware topology literal
    in multiple hierarchical collective examples.
