- label: conclusion-scale-facts
  start_line: 107
  end_line: 152
  lego_class: ConclusionScaleFacts
  purpose: Compute tail-latency fan-out probability, Llama 3 failure cadence, and
    straggler throughput drop for the six-principles summary.
  constants:
  - name: tail_servers
    value: '100'
    kind: scenario_assumption
    current_source: local_literal
    should_change: false
    target_source: null
    preserves_rendered_value: true
    narrative_check: The footnote uses a 100-server fan-out as a local example of
      tail amplification.
  - name: tail_percentile
    value: '0.99'
    kind: scenario_assumption
    current_source: local_literal
    should_change: false
    target_source: null
    preserves_rendered_value: true
    narrative_check: The P99 value is the explicit tail-latency scenario consumed
      by the adjacent footnote.
  - name: llama_failures
    value: '419'
    kind: empirical_value
    current_source: local_literal
    should_change: false
    target_source: new mlsysim.core.constants.LLAMA3_TRAINING_UNEXPECTED_FAILURES
      or a traceable empirical reliability record
    preserves_rendered_value: true
    narrative_check: Using a matching MLSysIM empirical record preserves the 419-failures
      prose and keeps the cited Llama 3 cadence aligned with the fault-tolerance chapter.
  - name: llama_days
    value: '54'
    kind: empirical_value
    current_source: local_literal
    should_change: false
    target_source: new mlsysim.core.constants.LLAMA3_TRAINING_FAILURE_WINDOW_DAYS
      or a traceable empirical reliability record
    preserves_rendered_value: true
    narrative_check: Using a matching MLSysIM empirical record preserves the 54-day
      prose and the one-failure-every-3-hours rendering.
  - name: hours_per_day
    value: '24'
    kind: unit_conversion
    current_source: mlsysim
    should_change: false
    target_source: mlsysim.core.constants.HOURS_PER_DAY
    preserves_rendered_value: true
    narrative_check: Replacing the local conversion with HOURS_PER_DAY preserves the
      rendered failure cadence.
  - name: straggler_speed
    value: '0.80'
    kind: scenario_assumption
    current_source: local_literal
    should_change: false
    target_source: null
    preserves_rendered_value: true
    narrative_check: The footnote intentionally uses an 80 percent-speed straggler
      as a worked example.
  - name: tail_hit_probability_formula
    value: 1 - tail_percentile**tail_servers
    kind: formula
    current_source: local_literal
    should_change: false
    target_source: null
    preserves_rendered_value: true
    narrative_check: The one-line probability expression is transparent and tied to
      the local fan-out example; no MLSysIM constant is needed.
