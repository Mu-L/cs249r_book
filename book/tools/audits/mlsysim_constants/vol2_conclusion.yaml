findings:
- id: conclusion-001-llama3-failure-cadence-source
  severity: low
  lines: 128-132, 166
  issue: 'The conclusion repeats the cited Llama 3 training failure record as local
    literals: 419 failures over 54 days, with a local 24 h/day conversion.'
  recommended_change: Add a traceable MLSysIM empirical reliability record or constants
    for the Llama 3 training failure count/window, and use HOURS_PER_DAY for the cadence
    calculation.
  mlsysim_target: new mlsysim.core.constants.LLAMA3_TRAINING_UNEXPECTED_FAILURES;
    new mlsysim.core.constants.LLAMA3_TRAINING_FAILURE_WINDOW_DAYS; mlsysim.core.constants.HOURS_PER_DAY
  render_impact: No rendered value change expected if initialized to 419 failures,
    54 days, and 24 h/day.
  prose_validation: The adjacent claim of roughly one failure every 3 hours remains
    narratively valid and stays aligned with the fault-tolerance chapter's Llama 3
    discussion.
- id: conclusion-002-post-silicon-energy-reference
  severity: low
  lines: 315-320, 332-339
  issue: The post-silicon notebook treats electrical and optical interconnect energy-per-bit
    values as technology reference points, but they are local literals.
  recommended_change: Create a traceable fabric energy-per-bit reference map or constants
    for long-reach electrical signaling and optical I/O scenarios.
  mlsysim_target: new mlsysim.core.constants.INTERCONNECT_ENERGY_PJ_PER_BIT_REFERENCE
    or a fabric energy profile registry
  render_impact: No rendered value change expected if the references preserve 10 pJ/bit
    electrical and 5 pJ/bit optical values.
  prose_validation: The 2x efficiency dividend and the single-digit-improvement narrative
    remain valid.
- id: conclusion-003-fermi-tflop-scale-local
  severity: low
  lines: 386-388
  issue: The Fermi estimate converts TFLOP/s to FLOP/s with a local 1e12 scalar even
    though MLSysIM exports TRILLION.
  recommended_change: Import TRILLION from MLSysIM and use it for the TFLOP-to-FLOP
    scaling.
  mlsysim_target: mlsysim.core.constants.TRILLION
  render_impact: No rendered value change expected.
  prose_validation: The hypothetical frontier-cluster comparison remains unchanged.
