findings:
- id: dt-001-10gbe-bandwidth-source
  severity: medium
  lines: 653-723
  issue: The 32-GPU commodity-network cell hard-codes 10GbE bandwidth as 1.25 GB/s
    while importing InfiniBand HDR and formatting the value as ib_hdr_str.
  recommended_change: Use NETWORK_10G_BW or Systems.Fabrics.Ethernet_10G.bandwidth,
    rename the formatted field to net_10g_str, and keep InfiniBand imports out of
    this cell unless needed.
  mlsysim_target: mlsysim.core.constants.NETWORK_10G_BW or mlsysim.Systems.Fabrics.Ethernet_10G.bandwidth
  render_impact: Should preserve the rendered 1.25 GB/s and all 32-GPU timing values.
  prose_validation: The prose says 10GbE/commodity network, so switching to the 10G
    MLSysIM constant makes the narrative more accurate.
- id: dt-002-local-precision-byte-conventions
  severity: medium
  lines: 578-651,653-723,1393-1518,1968-2085,2463-2547
  issue: Several cells duplicate FP16 byte width, full Adam optimizer-state bytes,
    and mixed-precision training-state bytes as local literals.
  recommended_change: Replace 2-byte literals with BYTES_FP16. Add a clean single-source
    convention for full Adam FP32 state, such as BYTES_ADAM_FP32_FULL_STATE = 3 *
    BYTES_FP32, and a formula for mixed_precision_adam_training_bytes = BYTES_FP16
    + BYTES_FP16 + BYTES_ADAM_FP32_FULL_STATE.
  mlsysim_target: mlsysim.core.constants.BYTES_FP16 plus a new mlsysim.core.constants.BYTES_ADAM_FP32_FULL_STATE
    or mlsysim.core.formulas training-state helper
  render_impact: 'Should preserve all memory values: 350 GB weights, 2100 GB Adam
    state, 2800 GB full state, 1120 GB for 70B training state.'
  prose_validation: The prose carefully distinguishes 8-byte simplified optimizer
    state from 12-byte full Adam; naming these conventions centrally would keep that
    distinction true.
- id: dt-003-reusable-formulas-local
  severity: low
  lines: 424-469,578-723,1662-1694,2679-2757
  issue: Ring AllReduce, hierarchical AllReduce, pipeline bubble, and Young-Daly formulas
    are reimplemented locally even though MLSysIM already exposes formula helpers.
  recommended_change: Use calc_ring_allreduce_time, calc_hierarchical_allreduce_time,
    calc_pipeline_bubble, and calc_young_daly_interval where their semantics match
    the prose.
  mlsysim_target: mlsysim.core.formulas
  render_impact: Pipeline bubble and Young-Daly should preserve values exactly. AllReduce
    helpers include latency terms, so rendered rounded milliseconds should be checked.
  prose_validation: The surrounding explanations are formula-based and remain true
    if the central helpers return the same displayed values.
- id: dt-004-gpt3-architecture-literals
  severity: low
  lines: 1968-2024
  issue: The 3D tensor-parallel traffic cell hard-codes GPT-3 hidden dimension and
    layer count even though MLSysIM has GPT3_HIDDEN_DIM and GPT3_LAYERS.
  recommended_change: Load hidden_dim and layers from Models.GPT3 or mlsysim.core.constants.GPT3_HIDDEN_DIM/GPT3_LAYERS.
  mlsysim_target: mlsysim.Models.GPT3 or mlsysim.core.constants.GPT3_HIDDEN_DIM and
    GPT3_LAYERS
  render_impact: Should preserve 201 MB activation payload and 67.6 GB full-forward
    traffic.
  prose_validation: The prose says 175B-scale/GPT-3-like dimensions, so central model
    architecture values match the narrative.
- id: dt-005-blackwell-nvlink5-local
  severity: low
  lines: 2105-2142
  issue: Blackwell NVLink 5 bandwidth is hard-coded as 1.8 TB/s despite existing MLSysIM
    B200/NVLink 5 constants.
  recommended_change: Derive the displayed value from NVLINK_B200_BW or Systems.Nodes.DGX_B200.intra_node_bw.
  mlsysim_target: mlsysim.core.constants.NVLINK_B200_BW or mlsysim.Systems.Nodes.DGX_B200.intra_node_bw
  render_impact: Should preserve the rendered 1.8 TB/s.
  prose_validation: The Blackwell paragraph remains true and gains a single source
    of truth.
- id: dt-006-optimizer-display-duplicates-registry-values
  severity: low
  lines: 2144-2201
  issue: AutoParallelism uses MLSysIM model and fleet objects for optimization but
    duplicates the rendered 175B and 8,192 values as string literals.
  recommended_change: Format params_b_str from model.parameters and gpu_count_str
    from fleet.count * fleet.node.accelerators_per_node.
  mlsysim_target: mlsysim.Models.GPT3 and mlsysim.Systems.Clusters.Frontier_8K
  render_impact: Should preserve the rendered values exactly.
  prose_validation: The optimizer prose remains true while avoiding drift if the registry
    changes.
- id: dt-007-dlrm-archetype-memory-local
  severity: info
  lines: 107-150,2792-2798
  issue: The DLRM archetype table uses a local 10 TB+ embedding-table scale not currently
    tied to a MLSysIM archetype/model constant.
  recommended_change: If this value is reused beyond this table, add a DLRM/Archetype
    B reference embedding-table memory constant or registry entry and derive the display
    from it.
  mlsysim_target: New MLSysIM Archetype B / DLRM reference model or embedding-table
    constant
  render_impact: Can preserve the 10 TB+ rendered value.
  prose_validation: The prose is qualitative and remains true if the canonical archetype
    value is 10 TB.
- id: dt-008-activation-memory-approximation
  severity: info
  lines: 1448-1518
  issue: The ZeRO-3 memory-wall cell uses a local 50 GB activation approximation rather
    than a named workload assumption or activation-memory formula.
  recommended_change: Keep it local if it is intentionally approximate; otherwise
    derive it with calc_activation_memory and document the strategy/coefficients.
  mlsysim_target: mlsysim.core.formulas.calc_activation_memory
  render_impact: Unknown; formula-based activation accounting may not render exactly
    50 GB without matching assumptions.
  prose_validation: The prose says approximately 50 GB, so a formula-derived replacement
    must be checked against that approximation.
