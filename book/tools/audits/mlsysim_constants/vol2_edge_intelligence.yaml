findings:
- id: edge-intelligence-byte-width-literals
  severity: medium
  lines: 395,653,1113,1927
  issue: Several cells hard-code FP32 as 4 bytes or divide bits by a local 8 even
    though MLSysIM already exports BYTES_FP32 and BITS_PER_BYTE.
  recommended_change: Import BYTES_FP32 and BITS_PER_BYTE from MLSysIM and derive
    weights, model sizes, adapter sizes, and update bytes from those constants.
  mlsysim_target: mlsysim.core.constants.BYTES_FP32; mlsysim.core.constants.BITS_PER_BYTE
  render_impact: Preserves the current rendered MB/KB values, 9x amplification, 200x
    adapter ratio, and 80x federated bandwidth saving.
  prose_validation: FP32 storage, adapter efficiency, and compressed-update prose
    remain narratively valid.
- id: edge-intelligence-mobilenet-and-tinytl-profiles-local
  severity: medium
  lines: 655-664,730,1519-1521
  issue: MobileNetV2 alpha variants and the TinyTL trainable-parameter example are
    local literals, while MLSysIM already owns core MobileNetV2 model identity and
    should single-source reusable variants/adaptation profiles.
  recommended_change: Use Models.Vision.MobileNetV2 for the alpha=1.0 anchor where
    current precision permits it, and add exact MobileNetV2 alpha=0.5 and TinyTL/MobileNetV2
    adaptation profiles for the remaining counts.
  mlsysim_target: mlsysim.Models.Vision.MobileNetV2 plus proposed MobileNetV2 alpha=0.5
    and TinyTL adaptation profile entries
  render_impact: Alpha=1.0 preserves rendered 3.5M and 14.0 MB at current precision;
    alpha=0.5 and TinyTL preserve current output if exact profiles are added.
  prose_validation: The MobileNet modularity and TinyTL 68x reduction prose remain
    valid.
- id: edge-intelligence-edge-benchmark-table-local
  severity: medium
  lines: 811-823,776-778
  issue: The edge inference landscape hard-codes empirical latency and energy points
    for Syntiant Core 2, STM32N6, Google Coral, and Jetson AGX Orin.
  recommended_change: Add MLSysIM edge inference benchmark profiles with device, workload,
    mode, latency_ms, energy_uJ, tier, and provenance fields; have the figure consume
    that table.
  mlsysim_target: proposed mlsysim benchmark/profile registry for edge inference measurements
  render_impact: Preserves current scatter points and the 100x energy-gap annotation
    if the same measurements are centralized.
  prose_validation: The under-5-ms MCU/ASIC claim, 30-160 microjoule summary, and
    15 mJ Jetson statement remain true.
- id: edge-intelligence-mobile-battery-constant-resourced-locally
  severity: low
  lines: 1005,1007
  issue: The battery-drain notebook repeats the 15 Wh phone battery literal and uses
    a local 60 minutes/hour conversion even though MLSysIM has the battery constant
    and unit conversions.
  recommended_change: Use PHONE_BATTERY_WH for battery_wh and MINUTES_PER_HOUR or
    pint unit conversion for t_train_h.
  mlsysim_target: mlsysim.core.constants.PHONE_BATTERY_WH; mlsysim.core.constants.MINUTES_PER_HOUR
  render_impact: Preserves the 2.25 Wh energy and 15.0 percent battery-drain result.
  prose_validation: The opportunistic-scheduling argument remains unchanged.
- id: edge-intelligence-mobilenet-cpu-npu-speedup-local
  severity: medium
  lines: 142-145,166-174
  issue: The MobileNet CPU-vs-NPU latency and energy comparison is a benchmark-like
    hardware/model profile encoded as notebook literals.
  recommended_change: Create a MobileNet mobile CPU/NPU benchmark profile in MLSysIM,
    clearly distinct from the existing accelerator-only ENERGY_MOBILENET_INF_MJ constant.
  mlsysim_target: proposed MobileNet mobile CPU/NPU benchmark profile with latency_ms
    and energy_j fields
  render_impact: Preserves 20x speedup and 50x energy gain if the same measurements
    are centralized.
  prose_validation: The silicon-dividend and battery-life interpretation remains valid.
- id: edge-intelligence-stm32-reference-local
  severity: low
  lines: 659,756
  issue: The STM32F4 footnote relies on a local 192 KB SRAM anchor rather than an
    MLSysIM microcontroller profile, while nearby ESP32 constants already exist.
  recommended_change: Add an STM32F4/H7 microcontroller profile or SRAM constant and
    use it for the dense-layer SRAM-share calculation.
  mlsysim_target: proposed mlsysim.Hardware.Tiny.STM32F4 or STM32H7 profile
  render_impact: Preserves the 20 percent SRAM-share statement if the profile keeps
    192 KB SRAM.
  prose_validation: The microcontroller memory-wall narrative remains valid.
- id: edge-intelligence-fedavg-round-bound-helper
  severity: medium
  lines: 2437-2451
  issue: The FedAvg IID/non-IID round-bound arithmetic is a reusable systems formula
    embedded directly in the chapter cell.
  recommended_change: Add an MLSysIM formula helper for the IID and heterogeneity-penalized
    FedAvg round bound, leaving scenario inputs local to the worked example.
  mlsysim_target: proposed mlsysim.physics.calc_fedavg_round_bound
  render_impact: Preserves 200 IID rounds, 5,625 non-IID rounds, and 3,125 reduced-local-epoch
    rounds.
  prose_validation: The convergence and communication-computation trade-off explanation
    remains valid.
- id: edge-intelligence-unused-compression-ratio
  severity: low
  lines: '1922'
  issue: FederatedSavings defines compression_ratio = 10 but computes update size
    from bits_per_update_param = 4; the unused literal can drift from the rendered
    4-bit update calculation.
  recommended_change: Remove compression_ratio or derive/check it from FP32_BITS /
