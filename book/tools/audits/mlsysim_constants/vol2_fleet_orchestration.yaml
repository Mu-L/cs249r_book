findings:
- id: fo-001-gpu-hour-economics-baseline-duplicated
  severity: medium
  lines: 76-207,215-249,1065-1119,1329-1378,1674-1810,1924-2005,2121-2168
  issue: The chapter repeatedly hard-codes a $2.00/GPU-hour fleet economics baseline,
    plus related spot and chargeback rates, while MLSysIM's existing CLOUD_GPU_TRAINING_PER_HOUR
    and CLOUD_GPU_INFERENCE_PER_HOUR use different values and therefore cannot be
    substituted without changing rendered prose.
  recommended_change: Add a named MLSysIM fleet-orchestration economics profile/helper
    for this chapter's cloud-equivalent GPU-hour baseline, spot price/discount, and
    internal chargeback rate, or centralize the profile in one chapter helper that
    all cells import.
  mlsysim_target: New MLSysIM fleet orchestration economics profile, Infrastructure.Pricing / Systems.Orchestration
    or mlsysim.core.scenarios, initialized with on_demand_gpu_hour_usd=2.0, spot examples
    0.50/0.70 as scenario values, and chargeback_gpu_hour_usd=2.50.
  render_impact: 'Rendered values should be preserved if initialized to the current
    rates: $480K/day, $87.6M/year waste at 10K/50%, $876K sharing savings, $504K hoarding
    cost, and ~$7M debugging value.'
  prose_validation: The economic narrative remains valid; directly using the current
    4.0 USD/hour MLSysIM training price would invalidate the displayed dollar amounts.
- id: fo-002-time-conversions-local
  severity: low
  lines: 76-207,1147-1271,1329-1378,1864-2005,2121-2168
  issue: Several cells use local 24, 365, 60, 7*24, or 8760 conversion literals even
    though MLSysIM exports canonical time conversions such as HOURS_PER_DAY, DAYS_PER_YEAR,
    MINUTES_PER_HOUR, and HOURS_PER_YEAR.
  recommended_change: Import the relevant MLSysIM time constants and use them for
    daily, annual, minute-to-hour, and weekly conversions; add DAYS_PER_WEEK/HOURS_PER_WEEK
    if the project wants a named weekly conversion.
  mlsysim_target: mlsysim.core.units.HOURS_PER_DAY, DAYS_PER_YEAR, MINUTES_PER_HOUR,
    HOURS_PER_YEAR; optional new DAYS_PER_WEEK or HOURS_PER_WEEK
  render_impact: No rendered change expected; all current hour/day/year calculations
    are standard conversions.
  prose_validation: Adjacent prose remains narratively valid because only unit conversions
    change.
- id: fo-003-gpus-per-host-local
  severity: low
  lines: 76-137,391-485
  issue: The fragmentation setup and figure hard-code 8 GPUs per node even though
    MLSysIM already exports Systems.Nodes.DGX_H100.accelerators_per_node and system node registry entries expose
    accelerators_per_node.
  recommended_change: Use Systems.Nodes.DGX_H100.accelerators_per_node
    for gpus_per_node, while keeping local node counts and job shapes as scenario
    assumptions.
  mlsysim_target: mlsysim.Systems.Nodes.DGX_H100.accelerators_per_node or mlsysim.Systems.Nodes.DGX_H100.accelerators_per_node
  render_impact: 'No rendered change expected: the examples still show 512 total GPUs
    in the 64-node scenario and an 8-column heatmap.'
  prose_validation: Fragmentation and topology prose remains true because it assumes
    standard 8-GPU nodes.
- id: fo-004-fragmentation-figure-status-duplicates-grid
  severity: low
  lines: 391-485
  issue: The fragmentation figure status panel duplicates total, allocated, free,
    free-percent, and request-size values as string literals rather than deriving
    them from the grid and node topology.
  recommended_change: Compute status_text values from row_patterns/grid, n_nodes,
    and Systems.Nodes.DGX_H100.accelerators_per_node so the figure annotation cannot drift from the plotted allocation.
  mlsysim_target: Local helper using Systems.Nodes.DGX_H100.accelerators_per_node; no new MLSysIM constant required
    beyond the node GPU count.
  render_impact: 'No rendered change expected: the panel should still show 64 total,
    45 allocated, 19 free, and 30 percent free.'
  prose_validation: The caption's 19 free GPUs and 30 percent fragmentation statement
    stays aligned with the figure.
- id: fo-005-cost-idle-comment-conflicts-with-mlsysim-price
  severity: low
  lines: 1065-1119
  issue: The cost-of-idle-GPUs figure comments say the $2/GPU-hour literal comes from
    constants.py CLOUD_GPU_TRAINING_PER_HOUR, but MLSysIM currently defines CLOUD_GPU_TRAINING_PER_HOUR
    as 4.0 USD/hour.
  recommended_change: Either update the comment to describe the $2 value as the fleet-orchestration
    economics baseline, or add the new named baseline from fo-001 and import it here.
  mlsysim_target: New fleet-orchestration economics baseline from fo-001; do not use
    CLOUD_GPU_TRAINING_PER_HOUR unless the rendered cost curve is intentionally changed.
  render_impact: Preserved if the figure continues using 2.0 USD/GPU-hour.
  prose_validation: The figure caption's $87.6M annual waste claim remains true only
    under the $2/GPU-hour baseline.
