findings:
  - id: vol2-inference-days-per-year-local
    severity: low
    lines: "219-247"
    issue: "The first serving-cost cell uses a local 365-day conversion even though MLSysIM already exports DAYS_PER_YEAR."
    recommended_change: "Import DAYS_PER_YEAR from mlsysim.core.constants/units and use it for days_per_year."
    mlsysim_target: mlsysim.core.units.DAYS_PER_YEAR
    render_impact: "No rendered change: annual requests stay 18.25B and the ratio still rounds to 9x."
    prose_validation: "The scenario and first-year framing remain true."
  - id: vol2-inference-kv-cache-architecture-literals
    severity: medium
    lines: "2230-2389"
    issue: "KV-cache wall and capacity estimator duplicate 70B model architecture, H100 node capacity, FP16 byte width, and KV formula values locally."
    recommended_change: "Use LLAMA2_70B_* or a dedicated exact 70B reference model, H100 capacity from Hardware/core constants, BYTES_FP16, and calc_kv_cache_size."
    mlsysim_target: "mlsysim.core.constants.LLAMA2_70B_*, mlsysim.Hardware.Cloud.H100, mlsysim.core.constants.BYTES_FP16, mlsysim.core.formulas.calc_kv_cache_size"
    render_impact: "Preserved if the exact 70B/Llama-2 constants are used; LLAMA3_70B_PARAMS would shift weight memory from 140 GB to about 141.2 GB."
    prose_validation: "The 35 GB INT4 weights, 327,680 bytes/token, 43 GB/request, and max batch 11 remain true under the exact 70B reference."
  - id: vol2-inference-kv-cache-compression-literals
    severity: medium
    lines: "2628-2863"
    issue: "Prefix caching, KV-cache compression, and precision-dividend cells keep transformer layer/head/hidden dimensions and precision widths as local literals."
    recommended_change: "Source layer/head/hidden dimensions from the Llama 70B constants or model registry, use BYTES_FP16/BYTES_INT4, and route KV-size arithmetic through calc_kv_cache_size."
    mlsysim_target: "mlsysim.core.constants.LLAMA2_70B_*, mlsysim.models.Models.Language.Llama2_70B, mlsysim.core.constants.BYTES_FP16/BYTES_INT4, mlsysim.core.formulas.calc_kv_cache_size"
    render_impact: "Rendered values should be preserved when using the exact 70B constants; formulas remove drift risk."
    prose_validation: "The prose distinction between MHA baseline and GQA remains true if kv_heads=64 is sourced from heads for the MHA baseline and kv_heads=8 for GQA."
  - id: vol2-inference-tp-layer-count-local
    severity: low
    lines: "3390-3442"
    issue: "Tensor-parallel speedup calculation hard-codes the Llama-70B layer count while the model constants already define it."
    recommended_change: "Replace n_layers=80 with LLAMA2_70B_LAYERS or Models.Language.Llama2_70B.layers."
    mlsysim_target: mlsysim.core.constants.LLAMA2_70B_LAYERS
    render_impact: "No rendered change: 2,400 ms sequential and 348 ms TP8 totals are preserved."
    prose_validation: "The Llama-70B prefill example remains true."
  - id: vol2-inference-moe-model-constants-missing
    severity: medium
    lines: "3541-3637"
    issue: "DeepSeek-V3 total/active parameter counts are duplicated across two cells and are true model constants for this case study, but MLSysIM has no single source for them."
    recommended_change: "Add model constants such as DEEPSEEK_V3_TOTAL_PARAMS and DEEPSEEK_V3_ACTIVE_PARAMS, ideally exposed through a MoE-capable model registry entry with active parameters metadata."
    mlsysim_target: "new mlsysim.core.constants.DEEPSEEK_V3_TOTAL_PARAMS and DEEPSEEK_V3_ACTIVE_PARAMS; optional Models.Language.DeepSeekV3"
    render_impact: "No rendered change if initialized to 671B total and 37B active."
    prose_validation: "The memory-capacity vs active-bandwidth MoE argument remains true and becomes less drift-prone."
  - id: vol2-inference-gpus-per-host-local
    severity: low
    lines: "3595-3637"
    issue: "MoE capacity planning uses a local 8 GPUs/node literal even though MLSysIM exports GPUS_PER_HOST."
    recommended_change: "Use GPUS_PER_HOST for node_gpus and derive n_gpus from nodes_needed * GPUS_PER_HOST."
    mlsysim_target: mlsysim.core.constants.GPUS_PER_HOST
    render_impact: "No rendered change: node capacity stays 640 GB and two nodes still provide 1,280 GB."
    prose_validation: "The 16-GPU read-per-token math remains true."
  - id: vol2-inference-int8-byte-local
    severity: low
    lines: "3883-3930"
    issue: "Meta embedding dense lower-bound check uses a local INT8 byte-width literal."
    recommended_change: "Use BYTES_INT8 for bytes_per_dimension_int8."
    mlsysim_target: mlsysim.core.constants.BYTES_INT8
    render_impact: "No rendered change: dense lower bound remains 1,280 TB."
    prose_validation: "The statement that the scale bullets cannot describe one fully materialized dense table remains true."
  - id: vol2-inference-allreduce-devices-local
    severity: low
    lines: "4011-4070"
    issue: "AllReduce interconnect calculation hard-codes an 8-device host topology even though MLSysIM exports GPUS_PER_HOST."
