findings:
- id: vol2-intro-001-gpt4-public-estimate-helper
  severity: medium
  lines: 135-162,165-175,240,1757-1826
  issue: 'The chapter repeats the GPT-4-class public-estimate scenario as local literals:
    25,000 A100-class GPUs, a 90-day run, and 10^25 FLOPs annotations.'
  recommended_change: Add a single MLSysIM GPT-4-class public-estimate case-study
    helper or constants for GPU count, training days, accelerator class, and headline
    training FLOPs; derive the reliability cell and duplicated prose/figure annotations
    from that source.
  mlsysim_target: new mlsysim case-study object or mlsysim.core.constants.GPT4_CLASS_PUBLIC_ESTIMATE_*
  render_impact: Should preserve the rendered 25,000 GPUs, 90 days, approximately
    2-hour MTBF, and 10^25 FLOPs annotations.
  prose_validation: The prose explicitly caveats these as illustrative/public estimates
    rather than disclosed values, so the centralized source should retain that wording.
- id: vol2-intro-002-cluster-size-dataset
  severity: medium
  lines: 260-347,351
  issue: The cluster-size explosion figure embeds a training-run accelerator-count
    dataset locally, including verified/estimated status, while the prose treats the
    trajectory as an empirical anchor for the scale moment.
  recommended_change: Move the model/year/accelerator_count/estimated records into
    a MLSysIM training-scale dataset or helper and have the figure load the records
    from there.
  mlsysim_target: new MLSysIM training-scale reference dataset/helper
  render_impact: Should preserve all plotted points, the estimated GPT-3 marker, the
    trend line, and the roughly four-orders-of-magnitude prose.
  prose_validation: The narrative remains valid if the same points are centralized;
    the helper should preserve the distinction between verified counts and public
    estimates.
- id: vol2-intro-003-gpt3-sync-tax-local-network-conventions
  severity: medium
  lines: 1614-1647,1666-1677
  issue: The GPT-3 synchronization tax cell locally encodes 100 Gb/s Ethernet, the
    Ring All-Reduce factor, FP16 byte width, and 15 pJ/bit network energy despite
    existing MLSysIM constants for several of these conventions.
  recommended_change: Use NETWORK_100G_BW, ALLREDUCE_FACTOR, and BYTES_FP16; add a
    traceable network-fabric energy-per-bit reference constant or helper for the 15
    pJ/bit assumption.
  mlsysim_target: mlsysim.core.constants.NETWORK_100G_BW, ALLREDUCE_FACTOR, BYTES_FP16,
    and new NETWORK_FABRIC_ENERGY_PJ_PER_BIT_REF
  render_impact: Should preserve 700 GB sync size, 4 percent InfiniBand efficiency,
    2 percent Ethernet efficiency, 84 J per endpoint synchronization, and 84 MJ per
    million endpoint synchronizations.
  prose_validation: The comparison remains narratively valid; central naming would
    make clear which values are hardware facts versus worked-scenario assumptions.
- id: vol2-intro-004-gpt3-training-tokens-prose-local
  severity: low
  lines: '1310'
  issue: The compute-optimal discussion hard-codes GPT-3's approximately 300 billion
    training tokens in prose even though MLSysIM already exposes GPT3_TRAINING_TOKENS.
  recommended_change: Render the token count from GPT3_TRAINING_TOKENS or a Models.GPT3
    training-data field when prose needs this value.
  mlsysim_target: mlsysim.core.constants.GPT3_TRAINING_TOKENS
  render_impact: Should preserve the displayed approximately 300 billion tokens.
  prose_validation: The Chinchilla-undertraining statement remains true if the MLSysIM
    constant remains 300B tokens.
