findings:
  - id: rai-responsible-technique-overhead-profiles
    severity: medium
    cells:
      - price-of-privacy-calc
      - null@2628
    issue: "Responsible-AI technique overheads are repeated as local literals: DP-SGD epsilon/accuracy/overhead profiles and approximate-SHAP latency ranges are chapter-level production profiles, not one-off scenario knobs."
    recommended_change: "Add MLSysIM responsibility/privacy/explainability profile objects or helpers for DP-SGD and SHAP overheads; source the privacy and explainability cells from those profiles while leaving scenario baselines such as 100 ms latency local."
    mlsysim_target: "mlsysim.ResponsibleEngineeringModel plus new DP-SGD accuracy/overhead profiles and approximate-SHAP latency/cost profiles"
    preserves_rendered_value: unknown
    prose_validation: "Strong privacy at epsilon 1.0 can preserve the 3x multiplier through the current solver. The epsilon 8.0 moderate profile currently renders 30 percent overhead, while the solver heuristic gives 25 percent, so either the helper calibration or adjacent prose must be reconciled. SHAP 50--200 ms should preserve the 150--300 ms and 1.5--3.0x capacity narrative."
  - id: rai-gpt-scale-training-case-study
    severity: medium
    cells:
      - price-of-privacy-calc
      - unlearning-cost-calc
    issue: "The chapter reuses a GPT-scale $4.6M training baseline and a 34-day 1024-A100 retraining duration as local literals, but MLSysIM's existing GPT3_TRAINING_DAYS_REF is a different 25-day A100 reference and there is no clean shared $4.6M cost source."
    recommended_change: "Create a named GPT-scale case-study constant/helper for the $4.6M cost and the 34-day retraining scenario, or explicitly document why this chapter intentionally uses a separate historical estimate."
    mlsysim_target: "new GPT3-scale training case-study object, e.g. GPT3_TRAINING_COST_USD_REF and GPT3_RETRAINING_DAYS_1024_A100_34D_REF"
    preserves_rendered_value: true
    prose_validation: "Preserving these values keeps the privacy price ($13.8M) and unlearning ($46k, about 8 hours) prose valid. Do not silently replace the 34-day literal with the existing 25-day MLSysIM value."
  - id: rai-local-unit-scalars
    severity: low
    cells:
      - unlearning-cost-calc
      - null@2361
    issue: "Two cells use local unit/display scalars even though MLSysIM constants are already imported or available: 24 hours/day and 1_000_000 for million-dollar display scaling."
    recommended_change: "Replace local unit scalars with MLSysIM constants or derived conversions."
    mlsysim_target: "mlsysim.core.constants.SEC_PER_DAY / SEC_PER_HOUR or mlsysim.core.units.HOURS_PER_DAY; mlsysim.core.constants.MILLION"
    preserves_rendered_value: true
    prose_validation: "Rendered SISA time and representation-tax dollar values remain unchanged."
