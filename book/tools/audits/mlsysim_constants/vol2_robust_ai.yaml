findings:
  - id: rai-001-bit-error-rate-and-hour-unit
    severity: medium
    lines: "319-367"
    issue: "RobustAISetup hard-codes the reliability baseline as 1e-17 errors per bit processed and computes seconds_per_hour as 60 * 60 locally."
    recommended_change: "Move the bit-error exposure baseline into an MLSysIM reliability constant/profile and replace seconds_per_hour with mlsysim.core.units.SEC_PER_HOUR."
    mlsysim_target: "New MEMORY_BIT_ERROR_RATE_PER_BIT or reliability profile, plus mlsysim.core.units.SEC_PER_HOUR"
    render_impact: "Should preserve the rendered 10^-17 error rate and approximately 0.26 expected errors per hour per V100 if the MLSysIM baseline is 1e-17."
    prose_validation: "The adjacent reliability narrative remains valid if MLSysIM documents this as an illustrative bit-processing soft-error baseline; if a different canonical rate is chosen, update the expected-errors/hour sentence together."
  - id: rai-002-drift-monitoring-thresholds-and-h100-mmd-latency
    severity: medium
    lines: "803-846,899-1015"
    issue: "Distribution-shift cells duplicate PSI warning/critical thresholds and hard-code a 150 ms MMD latency claim for 10K samples on H100-class hardware."
    recommended_change: "Add shared MLSysIM monitoring constants/helpers for PSI thresholds and, if reused, a small MMD latency benchmark/helper keyed by sample count and accelerator profile."
    mlsysim_target: "New PSI_WARN_THRESHOLD, PSI_CRITICAL_THRESHOLD, and optionally an MMD/H100 monitoring benchmark helper"
    render_impact: "Should preserve the 0.10 warning threshold, 0.25 critical threshold, 10K-sample MMD latency of 150 ms, and the figure zone boundaries."
    prose_validation: "The statistical-monitoring narrative remains valid if the shared thresholds preserve the current values; rerender the PSI detector figure after conversion to confirm the generated critical-crossing and recovery annotations still match the caption."
