findings:
- id: security-privacy-001-imagenet-precision-literals
  severity: low
  lines: 1282-1295, 1425
  issue: ImageNet class count is duplicated across two cells, and FP32 bit width is
    hard-coded despite an existing MLSysIM FP32_BITS constant.
  recommended_change: Add IMAGENET_NUM_CLASSES=1000 to MLSysIM's dataset constants
    and use FP32_BITS for fp32_bits.
  mlsysim_target: new mlsysim.core.constants.IMAGENET_NUM_CLASSES; mlsysim.core.constants.FP32_BITS
  render_impact: No rendered value change if IMAGENET_NUM_CLASSES is initialized to
    1000; the 13.3-bit, 25.3-bit, and top-5 calculations remain unchanged.
  prose_validation: The ImageNet classifier and output-rounding narrative remains
    valid.
- id: security-privacy-002-tee-model-memory-and-sgx-literals
  severity: medium
  lines: 1315-1347, 2559, 2644
  issue: TEE memory-footprint prose duplicates ResNet parameter counts, precision
    byte widths, and Intel SGX EPC/latency reference values locally.
  recommended_change: Use Models.Vision.ResNet50 or RESNET50_PARAMS plus BYTES_FP32/BYTES_INT8
    for ResNet-50; add RESNET18_PARAMS/Models.Vision.ResNet18 and an SGX hardware-security
    profile or constants for EPC size and latency references.
  mlsysim_target: mlsysim.models.Models.Vision.ResNet50; mlsysim.core.constants.RESNET50_PARAMS/BYTES_FP32/BYTES_INT8;
    new RESNET18_PARAMS and SGX EPC/latency constants
  render_impact: Existing ResNet-50 and byte-width constants preserve rendered values;
    adding ResNet-18=11.7M and SGX EPC=128 MB/base=5 ms/overflow=150 ms preserves
    current prose.
  prose_validation: The TEE sizing constraint and SGX EPC-overflow explanation remain
    narratively valid while becoming single-sourced.
- id: security-privacy-003-defense-billing-days-local
  severity: low
  lines: 1446, 1525
  issue: The production API legitimate-user cost uses a local 30-day billing-month
    literal even though MLSysIM exports DAYS_PER_MONTH.
  recommended_change: Import DAYS_PER_MONTH from mlsysim.core.constants/units and
    use it for billing_days.
  mlsysim_target: mlsysim.core.units.DAYS_PER_MONTH
  render_impact: 'No rendered value change: the legitimate monthly cost remains $9.'
  prose_validation: The monthly-cost acceptability claim remains true.
notes: []
