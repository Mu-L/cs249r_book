findings:
  - id: sustain-ai-001-gpt3-grid-literals
    severity: low
    lines: "136-147"
    issue: "GPT-3 energy and named grid intensities are duplicated as local literals despite existing MLSysIM constants/profiles."
    recommended_change: "Use GPT3_TRAINING_ENERGY_MWH and Infra.Grids.US_Avg/Quebec carbon_intensity_* accessors."
    mlsysim_target: "mlsysim.core.constants.GPT3_TRAINING_ENERGY_MWH; mlsysim.Infra.Grids"
    render_impact: "No rendered value change expected."
    prose_validation: "The training-energy, US-average, and hydro-region claims remain true."
  - id: sustain-ai-002-poland-grid-mismatch
    severity: medium
    lines: "241-249"
    issue: "CarbonFrontier uses Poland as 800 gCO2/kWh while MLSysIM's Poland grid profile is 820 gCO2/kWh."
    recommended_change: "Use Infra.Grids.Poland and update exact emissions/ratio prose, or add a distinct 800 g/kWh scenario profile if the 40x arithmetic is intentional."
    mlsysim_target: mlsysim.Infra.Grids.Poland.carbon_intensity_g_kwh
    render_impact: "Poland emissions would change from 8,000 to 8,200 tonnes and the exact ratio from 40x to 41x."
    prose_validation: "The qualitative coal-versus-hydro lesson remains true; exact math must be refreshed."
  - id: sustain-ai-003-placement-duration-magic-number
    severity: medium
    lines: "289-296"
    issue: "Placement optimizer duration is derived through a hidden 143.0 MWh/day literal rather than from the selected fleet's hardware power model."
    recommended_change: "Calculate duration from Systems.Clusters.Frontier_8K, H100_TDP/Hardware.H100.tdp, HOURS_PER_DAY, and the chosen PUE/MFU assumptions, or add an MLSysIM helper for energy_mwh_to_duration_days."
    mlsysim_target: "mlsysim.core.formulas.calc_duration_days_for_energy or SustainabilityModel helper"
    render_impact: "Best region likely remains Quebec; total TCO may shift depending on the exact fleet-power formula."
    prose_validation: "The optimizer narrative remains true if the derived duration preserves the intended 10,000 MWh workload."
  - id: sustain-ai-004-embodied-carbon-source
    severity: high
    lines: "842-843, 1425-1427, 1575-1576"
    issue: "Embodied carbon is repeatedly hard-coded as 164 kg while MLSysIM Hardware.H100 currently exposes 150 kg and Hardware.A100 exposes 130 kg."
    recommended_change: "Create or update traceable hardware embodied-carbon sources, disambiguating A100 estimate, H100 Gupta estimate, and NVIDIA H100 product-carbon-footprint value used by the prose."
    mlsysim_target: "mlsysim.Hardware.H100.embodied_carbon_kg; mlsysim.Hardware.A100.embodied_carbon_kg; optional PCF-specific constants"
    render_impact: "Using current MLSysIM hardware fields would change rendered embodied totals and shares; adding the 164 kg PCF source preserves current rendered values."
    prose_validation: "The prose says NVIDIA product carbon footprint, so a traceable H100 PCF source is cleaner than generic local literals."
  - id: sustain-ai-005-grid-and-calendar-literals
    severity: low
    lines: "1420-1437, 1577-1587, 1707-1715"
    issue: "Calendar and named-grid values are repeated locally in emissions calculations."
    recommended_change: "Use HOURS_PER_DAY, DAYS_PER_YEAR, HOURS_PER_YEAR, and Infra.Grids.US_Avg/Quebec accessors where the prose names those grids."
    mlsysim_target: "mlsysim.core.units; mlsysim.Infra.Grids"
    render_impact: "No rendered value change expected."
    prose_validation: "US-grid, Quebec-grid, and annualization prose remains true."
  - id: sustain-ai-006-pue-state-of-art-missing
    severity: medium
    lines: "1024-1031"
    issue: "PUE old=1.58 maps to PUE_LEGACY, but the state-of-the-art 1.10 benchmark is not represented in MLSysIM defaults."
    recommended_change: "Use PUE_LEGACY for 1.58 and add a traceable PUE_STATE_OF_ART=1.10 if the chapter needs that exact rendered example; otherwise switch to PUE_BEST_AIR=1.12 or PUE_LIQUID_COOLED=1.06 and update math."
    mlsysim_target: "mlsysim.core.defaults.PUE_LEGACY; new mlsysim.core.defaults.PUE_STATE_OF_ART"
    render_impact: "Adding 1.10 preserves 8,410 MWh savings; using existing 1.12 or 1.06 changes savings."
    prose_validation: "The PUE optimization lesson remains true; exact savings and 30 percent efficiency claim need recalculation if the target changes."
  - id: sustain-ai-007-phone-battery-mismatch
    severity: medium
    lines: "2353-2366"
    issue: "Phone battery capacity is hard-coded as 12.5 Wh while MLSysIM defines PHONE_BATTERY_WH as 15 Wh."
    recommended_change: "Either use PHONE_BATTERY_WH and update token capacity to 450, or add a traceable PHONE_BATTERY_WH_TYPICAL_COMPACT=12.5 Wh for this smartphone scenario."
    mlsysim_target: "mlsysim.core.constants.PHONE_BATTERY_WH or new compact-phone battery constant"
    render_impact: "Using current MLSysIM changes 45,000 J to 54,000 J, 2,250 J budget to 2,700 J, and 375 tokens to 450 tokens."
    prose_validation: "The infeasibility conclusion remains true, but exact arithmetic must match the selected source."
  - id: sustain-ai-008-platform-pj-flop-reference-missing
    severity: low
    lines: "2805-2811"
    issue: "CPU/GPU/TPU/ASIC pJ/FLOP reference values are durable architecture constants in prose but only exist as local literals."
    recommended_change: "Add a traceable platform energy-per-FLOP reference map or constants in MLSysIM, distinct from Horowitz operation-level ENERGY_FLOP_* constants."
    mlsysim_target: "new mlsysim.core.constants.ENERGY_PJ_PER_FLOP_PLATFORM_REFERENCE"
    render_impact: "Adding matching values preserves the 1000x range and footnote values."
    prose_validation: "The CPU-to-ASIC energy range remains true if the source is documented as a reference range rather than a physical universal constant."
