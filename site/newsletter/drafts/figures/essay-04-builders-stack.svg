<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720"
     font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect width="720" height="720" fill="#ffffff"/>

  <!-- ===== Defs ===== -->
  <defs>
    <marker id="rung-arrow" markerWidth="10" markerHeight="8" refX="9" refY="4"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#a31f34"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="360" y="48" text-anchor="middle" font-size="24" font-weight="800" fill="#1a1a1a"
        letter-spacing="-0.6">The Builder's Stack</text>
  <text x="360" y="74" text-anchor="middle" font-size="12.5" fill="#666" font-style="italic">
    Six rungs of AI engineering competence &#8212; and the open artifacts that get a learner to each rung.
  </text>

  <!-- ===== Climb arrow on left ===== -->
  <line x1="78" y1="615" x2="78" y2="118" stroke="#a31f34" stroke-width="2"
        opacity="0.55" marker-end="url(#rung-arrow)"/>
  <text x="58" y="367" text-anchor="middle" font-size="10" font-weight="700"
        fill="#a31f34" opacity="0.75" letter-spacing="2.5"
        transform="rotate(-90 58 367)">CLIMB</text>

  <!-- ===== Stack: top to bottom = VI to I ===== -->
  <!-- Rung box: x=110, w=400; Artifact callout: x=530, w=170 -->
  <!-- Rung height 78, gap 8. Stack y: 110 .. 624 -->

  <!-- ============= RUNG VI: TEACH (top) ============= -->
  <rect x="110" y="110" width="400" height="78" fill="#a31f34"/>
  <text x="128" y="135" font-size="11" font-weight="700" fill="#ffffff" opacity="0.65" letter-spacing="2">VI</text>
  <text x="128" y="161" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="0.5">TEACH</text>
  <text x="128" y="180" font-size="12" font-style="italic" fill="#ffffff" opacity="0.9">
    hand the discipline to a stranger
  </text>
  <line x1="510" y1="149" x2="530" y2="149" stroke="#a31f34" stroke-width="1.4"/>
  <rect x="530" y="110" width="170" height="78" fill="#fdf6ec" stroke="#d8c8aa" stroke-width="1"/>
  <text x="615" y="143" text-anchor="middle" font-size="14" font-weight="700" fill="#3a2a14">Instructor Hub</text>
  <text x="615" y="161" text-anchor="middle" font-size="10" fill="#7a6850">slides &#183; labs &#183; rubrics</text>
  <text x="615" y="178" text-anchor="middle" font-size="9.5" fill="#9a8a72" font-style="italic">course in a box</text>

  <!-- ============= RUNG V: TEST ============= -->
  <rect x="110" y="196" width="400" height="78" fill="#a31f34"/>
  <text x="128" y="221" font-size="11" font-weight="700" fill="#ffffff" opacity="0.65" letter-spacing="2">V</text>
  <text x="128" y="247" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="0.5">TEST</text>
  <text x="128" y="266" font-size="12" font-style="italic" fill="#ffffff" opacity="0.9">
    probe what you don't know you don't know
  </text>
  <line x1="510" y1="235" x2="530" y2="235" stroke="#a31f34" stroke-width="1.4"/>
  <rect x="530" y="196" width="170" height="78" fill="#fdf6ec" stroke="#d8c8aa" stroke-width="1"/>
  <text x="615" y="229" text-anchor="middle" font-size="14" font-weight="700" fill="#3a2a14">StaffML</text>
  <text x="615" y="247" text-anchor="middle" font-size="10" fill="#7a6850">vault &#183; drills &#183; mock rounds</text>
  <text x="615" y="264" text-anchor="middle" font-size="9.5" fill="#9a8a72" font-style="italic">unknown unknowns</text>

  <!-- ============= RUNG IV: DEPLOY ============= -->
  <rect x="110" y="282" width="400" height="78" fill="#a31f34"/>
  <text x="128" y="307" font-size="11" font-weight="700" fill="#ffffff" opacity="0.65" letter-spacing="2">IV</text>
  <text x="128" y="333" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="0.5">DEPLOY</text>
  <text x="128" y="352" font-size="12" font-style="italic" fill="#ffffff" opacity="0.9">
    operate under real physical limits
  </text>
  <line x1="510" y1="321" x2="530" y2="321" stroke="#a31f34" stroke-width="1.4"/>
  <rect x="530" y="282" width="170" height="78" fill="#fdf6ec" stroke="#d8c8aa" stroke-width="1"/>
  <text x="615" y="315" text-anchor="middle" font-size="14" font-weight="700" fill="#3a2a14">Hardware Kits</text>
  <text x="615" y="333" text-anchor="middle" font-size="10" fill="#7a6850">Arduino &#183; Seeed &#183; Pi</text>
  <text x="615" y="350" text-anchor="middle" font-size="9.5" fill="#9a8a72" font-style="italic">close the loop</text>

  <!-- ============= RUNG III: MODEL ============= -->
  <rect x="110" y="368" width="400" height="78" fill="#a31f34"/>
  <text x="128" y="393" font-size="11" font-weight="700" fill="#ffffff" opacity="0.65" letter-spacing="2">III</text>
  <text x="128" y="419" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="0.5">MODEL</text>
  <text x="128" y="438" font-size="12" font-style="italic" fill="#ffffff" opacity="0.9">
    reason about trade-offs analytically
  </text>
  <line x1="510" y1="407" x2="530" y2="407" stroke="#a31f34" stroke-width="1.4"/>
  <rect x="530" y="368" width="170" height="78" fill="#fdf6ec" stroke="#d8c8aa" stroke-width="1"/>
  <text x="615" y="401" text-anchor="middle" font-size="14" font-weight="700" fill="#3a2a14">MLSys&#183;im</text>
  <text x="615" y="419" text-anchor="middle" font-size="10" fill="#7a6850">22 walls &#183; labs</text>
  <text x="615" y="436" text-anchor="middle" font-size="9.5" fill="#9a8a72" font-style="italic">analytical engine</text>

  <!-- ============= RUNG II: BUILD ============= -->
  <rect x="110" y="454" width="400" height="78" fill="#a31f34"/>
  <text x="128" y="479" font-size="11" font-weight="700" fill="#ffffff" opacity="0.65" letter-spacing="2">II</text>
  <text x="128" y="505" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="0.5">BUILD</text>
  <text x="128" y="524" font-size="12" font-style="italic" fill="#ffffff" opacity="0.9">
    implement the mechanics yourself
  </text>
  <line x1="510" y1="493" x2="530" y2="493" stroke="#a31f34" stroke-width="1.4"/>
  <rect x="530" y="454" width="170" height="78" fill="#fdf6ec" stroke="#d8c8aa" stroke-width="1"/>
  <text x="615" y="487" text-anchor="middle" font-size="14" font-weight="700" fill="#3a2a14">TinyTorch</text>
  <text x="615" y="505" text-anchor="middle" font-size="10" fill="#7a6850">tensors &#8594; transformers</text>
  <text x="615" y="522" text-anchor="middle" font-size="9.5" fill="#9a8a72" font-style="italic">don't import torch</text>

  <!-- ============= RUNG I: USE (bottom) ============= -->
  <rect x="110" y="540" width="400" height="78" fill="#a31f34"/>
  <text x="128" y="565" font-size="11" font-weight="700" fill="#ffffff" opacity="0.65" letter-spacing="2">I</text>
  <text x="128" y="591" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="0.5">USE</text>
  <text x="128" y="610" font-size="12" font-style="italic" fill="#ffffff" opacity="0.9">
    call APIs and run notebooks
  </text>
  <line x1="510" y1="579" x2="530" y2="579" stroke="#a31f34" stroke-width="1.4"/>
  <rect x="530" y="540" width="170" height="78" fill="#fdf6ec" stroke="#d8c8aa" stroke-width="1"/>
  <text x="615" y="573" text-anchor="middle" font-size="14" font-weight="700" fill="#3a2a14">Textbook</text>
  <text x="615" y="591" text-anchor="middle" font-size="10" fill="#7a6850">Vol I (2026) &#183; Vol II (2027)</text>
  <text x="615" y="608" text-anchor="middle" font-size="9.5" fill="#9a8a72" font-style="italic">naming the discipline</text>

  <!-- ===== Footnote ===== -->
  <text x="360" y="660" text-anchor="middle" font-size="10.5" fill="#555">
    The third stack in the trilogy:
    <tspan font-style="italic" fill="#333">System Stack (Vol I)</tspan>
    &#160;&#183;&#160;
    <tspan font-style="italic" fill="#333">Fleet Stack (Vol II)</tspan>
    &#160;&#183;&#160;
    <tspan font-style="italic" font-weight="700" fill="#a31f34">Builder's Stack</tspan>
  </text>
  <text x="360" y="682" text-anchor="middle" font-size="9" fill="#999" font-style="italic">
    From Machine Learning Systems &#183; mlsysbook.ai/builders-stack
  </text>

</svg>
